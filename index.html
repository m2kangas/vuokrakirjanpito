function getCategorySection(categoryId, apartment) {
  const config = CONFIGURABLE_SECTION[categoryId];
  if (!config) {
    const cat = EXPENSE_CATEGORIES.find((c) => c.id === categoryId);
    return cat ? cat.section : "deductible";
  }
  const chosen = apartment?.[config.settingKey] || config.defaultValue;
  const opt = config.options.find((o) => o.value === chosen);
  return opt ? opt.section : "deductible";
}

};

/* ---------- Google auth + Drive + Sheets ---------- */
const SCOPES = "https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/userinfo.email";
const DRIVE = "https://www.googleapis.com/drive/v3";
const UPLOAD = "https://www.googleapis.com/upload/drive/v3";
const SHEETS = "https://sheets.googleapis.com/v4/spreadsheets";
const DATA_FILE_NAME = "vuokrakirjanpito-data.json";

function loadConfig() {
  try {
    return JSON.parse(localStorage.getItem("vkp_config") || "{}");
  } catch {
    return {};
  }
}
function saveConfig(patch) {
  const next = { ...loadConfig(), ...patch };
  localStorage.setItem("vkp_config", JSON.stringify(next));
  return next;
}

let tokenClient = null;
let currentToken = null; // { access_token, expiresAt }

function authHeaders() {
  return { Authorization: `Bearer ${currentToken.access_token}` };
}

function tokenValid() {
  return currentToken && currentToken.expiresAt > Date.now() + 60000;
}

function initTokenClient(clientId, onGranted) {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: clientId,
    scope: SCOPES,
    callback: (resp) => {
      if (resp.error) return;
      currentToken = { access_token: resp.access_token, expiresAt: Date.now() + resp.expires_in * 1000 };
      localStorage.setItem("vkp_token", JSON.stringify(currentToken));
      onGranted();
    },
  });
}
function requestToken(interactive) {
  tokenClient.requestAccessToken({ prompt: interactive ? "consent" : "" });
}

async function driveFindFile(folderId, name) {
  const q = encodeURIComponent(`'${folderId}' in parents and name='${name.replace(/'/g, "\\'")}' and trashed=false`);
  const res = await fetch(`${DRIVE}/files?q=${q}&fields=files(id,name)`, { headers: authHeaders() });
  const data = await res.json();
  return (data.files && data.files[0]) || null;
}
async function driveReadJson(fileId) {
  const res = await fetch(`${DRIVE}/files/${fileId}?alt=media`, { headers: authHeaders() });
  return res.json();
}
async function driveCreateJson(folderId, name, obj) {
  const boundary = "vkpboundary";
  const metadata = { name, parents: [folderId], mimeType: "application/json" };
  const body =
    `--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${JSON.stringify(metadata)}\r\n` +
    `--${boundary}\r\nContent-Type: application/json\r\n\r\n${JSON.stringify(obj)}\r\n--${boundary}--`;
  const res = await fetch(`${UPLOAD}/files?uploadType=multipart&fields=id`, {
    method: "POST",
    headers: { ...authHeaders(), "Content-Type": `multipart/related; boundary=${boundary}` },
    body,
  });
  return res.json();
}
async function driveUpdateJson(fileId, obj) {
  await fetch(`${UPLOAD}/files/${fileId}?uploadType=media`, {
    method: "PATCH",
    headers: { ...authHeaders(), "Content-Type": "application/json" },
    body: JSON.stringify(obj),
  });
}
async function driveAddParent(fileId, folderId) {
  await fetch(`${DRIVE}/files/${fileId}?addParents=${folderId}&fields=id`, { method: "PATCH", headers: authHeaders() });
}

function arrayBufferToBase64(buffer) {
  let binary = "";
  const bytes = new Uint8Array(buffer);
  const chunkSize = 0x8000;
  for (let i = 0; i < bytes.length; i += chunkSize) {
    binary += String.fromCharCode.apply(null, bytes.subarray(i, i + chunkSize));
  }
  return btoa(binary);
}

async function driveFindFolder(parentId, name) {
  const q = encodeURIComponent(
    `'${parentId}' in parents and name='${name.replace(/'/g, "\\'")}' and mimeType='application/vnd.google-apps.folder' and trashed=false`
  );
  const res = await fetch(`${DRIVE}/files?q=${q}&fields=files(id,name)`, { headers: authHeaders() });
  const data = await res.json();
  return (data.files && data.files[0]) || null;
}
async function driveCreateFolder(parentId, name) {
  const res = await fetch(`${DRIVE}/files?fields=id`, {
    method: "POST",
    headers: { ...authHeaders(), "Content-Type": "application/json" },
    body: JSON.stringify({ name, mimeType: "application/vnd.google-apps.folder", parents: [parentId] }),
  });
  return res.json();
}
async function findOrCreateFolder(parentId, name) {
  const existing = await driveFindFolder(parentId, name);
  if (existing) return existing.id;
  const created = await driveCreateFolder(parentId, name);
  return created.id;
}
async function driveUploadBinary(folderId, filename, mimeType, arrayBuffer) {
  const base64 = arrayBufferToBase64(arrayBuffer);
  const boundary = "vkpboundary2";
  const metadata = { name: filename, parents: [folderId] };
  const body =
    `--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${JSON.stringify(metadata)}\r\n` +
    `--${boundary}\r\nContent-Type: ${mimeType}\r\nContent-Transfer-Encoding: base64\r\n\r\n${base64}\r\n--${boundary}--`;
  const res = await fetch(`${UPLOAD}/files?uploadType=multipart&fields=id,webViewLink`, {
    method: "POST",
    headers: { ...authHeaders(), "Content-Type": `multipart/related; boundary=${boundary}` },
    body,
  });
  return res.json();
}

/* ---------- recurring transactions ---------- */
const monthKey = (isoDate) => isoDate.slice(0, 7);
function addMonths(ym, n) {
  const [y, m] = ym.split("-").map(Number);
  const d = new Date(y, m - 1 + n, 1);
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`;
}
function daysInMonth(y, m) {
  return new Date(y, m, 0).getDate();
}
function generateDueRecurring(templates, transactions) {
  const now = new Date();
  const currentMonth = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, "0")}`;
  const newTx = [];
  for (const t of templates) {
    if (!t.active) continue;
    let cursor = t.startMonth;
    const endMonth = t.endMonth && t.endMonth < currentMonth ? t.endMonth : currentMonth;
    let guard = 0;
    while (cursor <= endMonth && guard < 600) {
      guard++;
      const already = transactions.some((tx) => tx.recurringId === t.id && monthKey(tx.date) === cursor);
      if (!already) {
        const [y, m] = cursor.split("-").map(Number);
        const day = Math.min(t.dayOfMonth || 1, daysInMonth(y, m));
        const date = `${cursor}-${String(day).padStart(2, "0")}`;
        newTx.push({
          id: uid(), apartmentId: t.apartmentId, type: t.type, category: t.category,
          date, amount: t.amount, description: t.description || "", recurringId: t.id,
        });
      }
      cursor = addMonths(cursor, 1);
    }
  }
  return newTx;
}

/* ---------- Gemini receipt extraction ---------- */
async function extractReceiptWithGemini(apiKey, base64, mimeType) {
  const categoryList = ALL_CATEGORIES.map((c) => `${c.id}: ${c.fi} / ${c.en}`).join("\n");
  const prompt =
    "You are extracting structured data from a rental-property receipt or invoice for a Finnish landlord's bookkeeping app.\n" +
    "Return ONLY compact JSON, no markdown, no explanation, matching exactly this shape:\n" +
    '{"type":"income"|"expense","category":"<one id from the list below>","date":"YYYY-MM-DD","amount":<plain number, EUR>,"description":"<short text, vendor or purpose>"}\n' +
    "Category ids you must choose from:\n" + categoryList + "\n" +
    'If unsure of category, use "muu_kulu" for costs or "other_income" for income. Amount must be a plain number with no currency symbol.';
  const body = { contents: [{ parts: [{ text: prompt }, { inline_data: { mime_type: mimeType, data: base64 } }] }] };
  const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent`, {
    method: "POST",
    headers: { "Content-Type": "application/json", "x-goog-api-key": apiKey },
    body: JSON.stringify(body),
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message || "Gemini request failed");
  const text = data?.candidates?.[0]?.content?.parts?.[0]?.text || "";
  const cleaned = text.replace(/```json|```/g, "").trim();
  return JSON.parse(cleaned);
}

async function sheetsCreate(title) {
  const res = await fetch(SHEETS, {
    method: "POST",
    headers: { ...authHeaders(), "Content-Type": "application/json" },
    body: JSON.stringify({
      properties: { title },
      sheets: [{ properties: { title: "Apartments" } }, { properties: { title: "Transactions" } }],
    }),
  });
  return res.json();
}
async function sheetsClearAndWrite(spreadsheetId, sheetName, rows) {
  await fetch(`${SHEETS}/${spreadsheetId}/values/${encodeURIComponent(sheetName)}:clear`, {
    method: "POST",
    headers: authHeaders(),
  });
  await fetch(`${SHEETS}/${spreadsheetId}/values/${encodeURIComponent(sheetName)}!A1?valueInputOption=RAW`, {
    method: "PUT",
    headers: { ...authHeaders(), "Content-Type": "application/json" },
    body: JSON.stringify({ values: rows }),
  });
}

async function findOrCreateSpreadsheet(folderId) {
  const existing = await driveFindFile(folderId, SHEET_FILE_NAME);
  if (existing) return existing.id;
  const created = await sheetsCreate(SHEET_FILE_NAME);
  await driveAddParent(created.spreadsheetId, folderId);
  return created.spreadsheetId;
}

function rvLabelFor(apartment) {
  const opt = CONFIGURABLE_SECTION.rahoitusvastike.options.find(
    (o) => o.value === (apartment.rahoitusvastikeTreatment || "income")
  );
  return opt ? opt.label : "";
}
function evLabelFor(apartment) {
  const opt = CONFIGURABLE_SECTION.erityisvastike.options.find(
    (o) => o.value === (apartment.erityisvastikeTreatment || "income")
  );
  return opt ? opt.label : "";
}

async function syncSheet(folderId, apartments, transactions, onDone) {
  try {
    const ssId = await findOrCreateSpreadsheet(folderId);
    const apRows = [
      [
        "Name", "Address", "Housing company", "Your share %",
        "Rahoitusvastike treatment", "Erityisvastike description", "Erityisvastike treatment", "Notes",
      ],
      ...apartments.map((a) => [
        a.name || "", a.address || "", a.housingCompany || "", a.sharePercent ?? 100,
        rvLabelFor(a), a.erityisvastikeDescription || "", a.erityisvastikeDescription ? evLabelFor(a) : "", a.notes || "",
      ]),
    ];
    const txRows = [
      ["Apartment", "Date", "Type", "Category (FI)", "Category (EN)", "Amount EUR", "Description"],
      ...transactions
        .slice()
        .sort((a, b) => new Date(a.date) - new Date(b.date))
        .map((t) => {
          const a = apartments.find((x) => x.id === t.apartmentId);
          return [
            a ? a.name : "", t.date, t.type, catLabel(t.category), catEn(t.category), t.amount, t.description || "",
          ];
        }),
    ];
    await sheetsClearAndWrite(ssId, "Apartments", apRows);
    await sheetsClearAndWrite(ssId, "Transactions", txRows);
    onDone && onDone(null, ssId);
  } catch (e) {
    onDone && onDone(e, null);
  }
}

/* ---------- Setup screen: credentials, sign in, folder ---------- */
function SetupScreen({ config, signedIn, error, onConfigSaved, onFolderChosen }) {
  const [clientId, setClientId] = useState(config.clientId || "");
  const [apiKey, setApiKey] = useState(config.apiKey || "");
  const [allowedEmail, setAllowedEmail] = useState(config.allowedEmail || "");
  const [gapiReady, setGapiReady] = useState(false);
  const [busy, setBusy] = useState(false);

  useEffect(() => {
    const t = setInterval(() => {
      if (window.gapi && window.google && window.google.accounts) {
        setGapiReady(true);
        clearInterval(t);
      }
    }, 200);
    return () => clearInterval(t);
  }, []);

  function saveCreds() {
    onConfigSaved({ clientId: clientId.trim(), apiKey: apiKey.trim(), allowedEmail: allowedEmail.trim() });
  }

  function connect() {
    setBusy(true);
    requestToken(true);
    setTimeout(() => setBusy(false), 3000);
  }

  function pickFolder() {
    window.gapi.load("picker", () => {
      const view = new google.picker.DocsView(google.picker.ViewId.FOLDERS)
        .setSelectFolderEnabled(true)
        .setIncludeFolders(true);
      const picker = new google.picker.PickerBuilder()
        .addView(view)
        .setOAuthToken(currentToken.access_token)
        .setDeveloperKey(config.apiKey)
        .setCallback((data) => {
          if (data.action === google.picker.Action.PICKED) {
            const doc = data.docs[0];
            onFolderChosen({ id: doc.id, name: doc.name });
          }
        })
        .build();
      picker.setVisible(true);
    });
  }

  const needsCreds = !config.clientId || !config.apiKey;

  return (
    <div className="min-h-screen flex items-center justify-center px-4">
      <div className="w-full max-w-md rounded-lg border p-6" style={{ borderColor: LINE, background: CARD }}>

/* ---------- Transaction form ---------- */
function TransactionFormModal({ apartments, defaultApartmentId, geminiApiKey, onClose, onSave }) {
  const [form, setForm] = useState({
    apartmentId: defaultApartmentId || apartments[0]?.id,
    type: "income", category: "rent", date: new Date().toISOString().slice(0, 10), amount: "", description: "",
  });
  const [receiptFile, setReceiptFile] = useState(null);
  const [repeatMonthly, setRepeatMonthly] = useState(false);
  const [repeatEndMonth, setRepeatEndMonth] = useState("");
  const [scanning, setScanning] = useState(false);
  const [scanError, setScanError] = useState("");
  const [saving, setSaving] = useState(false);

  const categories = form.type === "income" ? INCOME_CATEGORIES : EXPENSE_CATEGORIES;
  const activeCat = ALL_CATEGORIES.find((c) => c.id === form.category);
  function setType(type) {
    const firstCat = (type === "income" ? INCOME_CATEGORIES : EXPENSE_CATEGORIES)[0].id;
    setForm({ ...form, type, category: firstCat });
  }

  async function scanReceipt() {
    if (!receiptFile) return;
    setScanning(true);
    setScanError("");
    try {
      const buf = await receiptFile.arrayBuffer();
      const base64 = arrayBufferToBase64(buf);
      const extracted = await extractReceiptWithGemini(geminiApiKey, base64, receiptFile.type || "application/pdf");
      const validCategories = extracted.type === "income" ? INCOME_CATEGORIES : EXPENSE_CATEGORIES;
      const category = validCategories.find((c) => c.id === extracted.category)
        ? extracted.category
        : (extracted.type === "income" ? "other_income" : "muu_kulu");
      setForm({
        ...form,
        type: extracted.type === "income" ? "income" : "expense",
        category,
        date: extracted.date || form.date,
        amount: extracted.amount != null ? String(extracted.amount) : form.amount,
        description: extracted.description || form.description,
      });
    } catch (e) {
      setScanError("Could not read the receipt: " + e.message);
    }
    setScanning(false);
  }

  async function handleSave() {
    if (!form.apartmentId || !(Number(form.amount) > 0)) return;
    setSaving(true);
    let attachment = {};
    if (receiptFile) {
      try {
        const buf = await receiptFile.arrayBuffer();
        attachment = { __uploadFile: { name: receiptFile.name, mimeType: receiptFile.type || "application/octet-stream", buffer: buf } };
      } catch (e) {
        setScanError("Could not read the file to attach: " + e.message);
        setSaving(false);
        return;
      }
    }
    onSave(
      { ...form, amount: Number(form.amount), ...attachment },
      repeatMonthly ? { dayOfMonth: Number(form.date.slice(8, 10)), startMonth: form.date.slice(0, 7), endMonth: repeatEndMonth || null } : null
    );
  }

  return (
    <Modal onClose={onClose} title="Add transaction">
      <Field label="Apartment">
        <select className={inputCls} style={inputStyle} value={form.apartmentId}
          onChange={(e) => setForm({ ...form, apartmentId: e.target.value })}>
          {apartments.map((a) => <option key={a.id} value={a.id}>{a.name}</option>)}
        </select>
      </Field>

      <Field label="Receipt or invoice, optional (image or PDF)">
        <input type="file" accept="image/*,application/pdf" className={inputCls} style={inputStyle}
          onChange={(e) => { setReceiptFile(e.target.files[0] || null); setScanError(""); }} />
      </Field>
      {receiptFile && geminiApiKey && (
        <div className="mb-3">
          <button onClick={scanReceipt} disabled={scanning} type="button"
            className="w-full py-2 rounded text-sm font-medium border disabled:opacity-50"
            style={{ borderColor: TEAL, color: TEAL }}>
            {scanning ? "Reading receipt..." : "Fill from receipt with Gemini"}
          </button>
          {scanError && <div className="text-xs mt-1" style={{ color: RUST }}>{scanError}</div>}
          <div className="text-xs mt-1" style={{ color: MUTE }}>Review the filled-in fields below before saving, it's a best guess.</div>
        </div>
      )}

      <div className="flex gap-2 mb-3">
        <button onClick={() => setType("income")} className="flex-1 py-2 rounded text-sm font-medium border"
          style={{ background: form.type === "income" ? GREEN : "transparent", color: form.type === "income" ? "#fff" : INK, borderColor: form.type === "income" ? GREEN : LINE }}>
          Income
        </button>
        <button onClick={() => setType("expense")} className="flex-1 py-2 rounded text-sm font-medium border"
          style={{ background: form.type === "expense" ? RUST : "transparent", color: form.type === "expense" ? "#fff" : INK, borderColor: form.type === "expense" ? RUST : LINE }}>
          Cost
        </button>
      </div>
      <Field label="Category">
        <select className={inputCls} style={inputStyle} value={form.category}
          onChange={(e) => setForm({ ...form, category: e.target.value })}>
          {categories.map((c) => (
            <option key={c.id} value={c.id}>{categoryLabelFor(c, apartments.find((a) => a.id === form.apartmentId))}</option>
          ))}
        </select>
        {activeCat?.note && <div className="text-xs mt-1" style={{ color: MUTE }}>{activeCat.note}</div>}
      </Field>
      <div className="grid grid-cols-2 gap-3">
        <Field label="Date">
          <input type="date" className={inputCls} style={inputStyle} value={form.date}
            onChange={(e) => setForm({ ...form, date: e.target.value })} />
        </Field>
        <Field label="Amount, EUR">
          <input type="number" step="0.01" className={inputCls} style={inputStyle} value={form.amount}
            placeholder="0.00" onChange={(e) => setForm({ ...form, amount: e.target.value })} />
        </Field>
      </div>
      <Field label="Description, optional">
        <input className={inputCls} style={inputStyle} value={form.description}
          placeholder="e.g. June rent, tenant Matti" onChange={(e) => setForm({ ...form, description: e.target.value })} />
      </Field>

      <label className="flex items-center gap-2 mb-3 text-sm" style={{ color: INK }}>
        <input type="checkbox" checked={repeatMonthly} onChange={(e) => setRepeatMonthly(e.target.checked)} />
        Repeat monthly from this date
      </label>
      {repeatMonthly && (
        <Field label="Stop after month, optional (leave blank for no end)">
          <input type="month" className={inputCls} style={inputStyle} value={repeatEndMonth}
            onChange={(e) => setRepeatEndMonth(e.target.value)} />
        </Field>
      )}

      <button onClick={handleSave} disabled={!form.apartmentId || !(Number(form.amount) > 0) || saving}
        className="w-full mt-2 py-2.5 rounded text-sm font-medium disabled:opacity-40" style={{ background: TEAL, color: "#fff" }}>
        {saving ? "Saving..." : "Save transaction"}
      </button>
    </Modal>
  );
}

function TaxReportTab({ apartments, transactions, year, taxApartmentId, setTaxApartmentId, sheetUrl }) {
  const relevantApartments = taxApartmentId === "all" ? apartments : apartments.filter((a) => a.id === taxApartmentId);

  function computeFor(apartmentId) {
    const apartment = apartments.find((a) => a.id === apartmentId);
    const rows = transactions.filter((t) => t.apartmentId === apartmentId && new Date(t.date).getFullYear() === year);
    const byCategory = {};
    for (const c of ALL_CATEGORIES) byCategory[c.id] = 0;
    for (const r of rows) byCategory[r.category] += Number(r.amount);
    const incomeTotal = INCOME_CATEGORIES.reduce((s, c) => s + byCategory[c.id], 0);
    const deductibleCategories = EXPENSE_CATEGORIES.filter((c) => getCategorySection(c.id, apartment) === "deductible");
    const capitalizedCategories = EXPENSE_CATEGORIES.filter((c) => getCategorySection(c.id, apartment) === "capitalized");
    const interestCategories = EXPENSE_CATEGORIES.filter((c) => getCategorySection(c.id, apartment) === "interest");
    const expenseTotal = deductibleCategories.reduce((s, c) => s + byCategory[c.id], 0);
    const capitalizedTotal = capitalizedCategories.reduce((s, c) => s + byCategory[c.id], 0);
    const interestTotal = interestCategories.reduce((s, c) => s + byCategory[c.id], 0);
    return { byCategory, incomeTotal, expenseTotal, capitalizedTotal, interestTotal, deductibleCategories, capitalizedCategories, interestCategories, net: incomeTotal - expenseTotal };
  }

  function downloadCsv() {
    const lines = [["Apartment", "Date", "Type", "Category", "Category (EN)", "Amount EUR", "Description"]];
    transactions
      .filter((t) => new Date(t.date).getFullYear() === year)
      .filter((t) => taxApartmentId === "all" || t.apartmentId === taxApartmentId)
      .forEach((t) => {
        const a = apartments.find((a) => a.id === t.apartmentId);
        lines.push([a?.name || "", t.date, t.type, catLabel(t.category), catEn(t.category), String(t.amount).replace(".", ","), t.description || ""]);
      });
    const csv = lines.map((row) => row.map((v) => `"${String(v).replace(/"/g, '""')}"`).join(";")).join("\n");
    const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
    const url = URL.createObjectURL(blob);
    const link = document.createElement("a");
    link.href = url; link.download = `vuokratulot_${year}.csv`; link.click();
    URL.revokeObjectURL(url);
  }

  if (apartments.length === 0) return <EmptyState title="No apartments yet" body="Add an apartment and record transactions first." />;

  return (
    <Section eyebrow={String(year)} title="Tax report" right={
      <div className="flex items-center gap-2">
        <select value={taxApartmentId} onChange={(e) => setTaxApartmentId(e.target.value)} className="px-3 py-2 rounded border text-sm" style={{ borderColor: LINE, color: INK }}>
          <option value="all">All apartments, separate</option>
          {apartments.map((a) => <option key={a.id} value={a.id}>{a.name}</option>)}
        </select>
        <button onClick={downloadCsv} className="px-3 py-2 rounded text-sm font-medium border" style={{ borderColor: LINE, color: INK }}>Export CSV</button>
        {sheetUrl && <a href={sheetUrl} target="_blank" rel="noreferrer" className="px-3 py-2 rounded text-sm font-medium border" style={{ borderColor: LINE, color: INK }}>Open Sheet</a>}
      </div>
    }>
      <div className="text-xs mb-5 px-3 py-2 rounded" style={{ background: "#EEF2E9", color: "#4A5C3D" }}>
        Structured like the Finnish rental income report (vuokratulot, form 7H). Vuosikorjaus is deductible in
        full, perusparannus is not and gets capitalized or depreciated instead. Loan interest is shown
        separately, it reduces your total capital income rather than this apartment's rental result, and is
        not deductible at all if you charge below market rent. This is a starting point for your own filing,
        not tax advice, confirm the financing fee and erityisvastike treatment with your housing company.
      </div>
      <div className="space-y-6">
        {relevantApartments.map((a) => {
          const r = computeFor(a.id);
          const share = (a.sharePercent ?? 100) / 100;
          return (
            <div key={a.id} className="rounded border overflow-hidden" style={{ borderColor: LINE, background: CARD }}>
              <div className="px-4 py-3 flex items-center justify-between" style={{ background: "#F1EFE6" }}>
                <div className="text-sm font-semibold" style={{ color: INK }}>{a.name}</div>
                <div className="text-xs" style={{ color: MUTE }}>{a.housingCompany}</div>
              </div>
              <div className="px-4 py-3">
                <div className="text-xs font-semibold uppercase tracking-wide mb-2" style={{ color: MUTE }}>Income</div>
                {INCOME_CATEGORIES.map((c) => <RowLine key={c.id} label={`${c.fi} (${c.en})`} value={r.byCategory[c.id]} />)}
                <RowLine label="Total rental income" value={r.incomeTotal} bold />

                <div className="text-xs font-semibold uppercase tracking-wide mt-4 mb-2" style={{ color: MUTE }}>Deductible costs</div>
                {r.deductibleCategories.map((c) => <RowLine key={c.id} label={categoryLabelFor(c, a)} value={r.byCategory[c.id]} negative />)}
                <RowLine label="Total deductible costs" value={r.expenseTotal} negative bold />

                <div className="mt-3 pt-3 border-t" style={{ borderColor: LINE }}>
                  <RowLine label="Net rental result, 100%" value={r.net} bold />
                  <RowLine label={`Your taxable share, ${a.sharePercent ?? 100}%`} value={r.net * share} bold accent />
                </div>

                {r.capitalizedTotal !== 0 && (
                  <div className="mt-4 pt-3 border-t" style={{ borderColor: LINE }}>
                    <div className="text-xs font-semibold uppercase tracking-wide mb-2" style={{ color: MUTE }}>Not deductible, added to acquisition cost</div>
                    {r.capitalizedCategories.map((c) => <RowLine key={c.id} label={categoryLabelFor(c, a)} value={r.byCategory[c.id]} negative />)}
                    <RowLine label="Total added to acquisition cost" value={r.capitalizedTotal} negative bold />
                  </div>
                )}

                {r.interestTotal !== 0 && (
                  <div className="mt-4 pt-3 border-t" style={{ borderColor: LINE }}>
                    <div className="text-xs font-semibold uppercase tracking-wide mb-2" style={{ color: MUTE }}>Loan interest, reported separately</div>
                    {r.interestCategories.map((c) => <RowLine key={c.id} label={categoryLabelFor(c, a)} value={r.byCategory[c.id]} negative />)}
                    <RowLine label="Total loan interest" value={r.interestTotal} negative bold />
                    <RowLine label={`Your taxable share of the interest, ${a.sharePercent ?? 100}%`} value={r.interestTotal * share} negative />
                  </div>
                )}
              </div>
            </div>
          );
        })}
      </div>
    </Section>
  );
}

/* ---------- Main app ---------- */
function App() {
  const [config, setConfig] = useState(loadConfig());
  const [ready, setReady] = useState(false); // signed in + folder chosen + data loaded
  const [apartments, setApartments] = useState([]);
  const [transactions, setTransactions] = useState([]);
  const [recurringTemplates, setRecurringTemplates] = useState([]);
  const [showRecurringModal, setShowRecurringModal] = useState(false);
  const [tab, setTab] = useState("overview");
  const [year, setYear] = useState(new Date().getFullYear());
  const [taxApartmentId, setTaxApartmentId] = useState("all");
  const [txApartmentFilter, setTxApartmentFilter] = useState("all");
  const [showApartmentForm, setShowApartmentForm] = useState(false);
  const [showTxForm, setShowTxForm] = useState(false);
  const [editingApartment, setEditingApartment] = useState(null);
  const [error, setError] = useState("");
  const [syncStatus, setSyncStatus] = useState("");
  const [sheetUrl, setSheetUrl] = useState("");
  const [signedIn, setSignedIn] = useState(false);
  const [folder, setFolder] = useState(config.folderId ? { id: config.folderId, name: config.folderName } : null);
  const tokenClientReadyRef = useRef(false);

  useEffect(() => {
    const t = setInterval(() => {
      if (window.google && window.google.accounts && config.clientId && !tokenClientReadyRef.current) {
        initTokenClient(config.clientId, onTokenGranted);
        tokenClientReadyRef.current = true;
        clearInterval(t);
      }
    }, 200);
    return () => clearInterval(t);
  }, [config.clientId]);

  async function onTokenGranted() {
    const allowed = (config.allowedEmail || "").trim().toLowerCase();
    if (!allowed) { setSignedIn(true); return; }
    try {
      const res = await fetch("https://www.googleapis.com/oauth2/v3/userinfo", { headers: authHeaders() });
      const info = await res.json();
      const email = (info.email || "").toLowerCase();
      if (email !== allowed) {
        currentToken = null;
        localStorage.removeItem("vkp_token");
        setSignedIn(false);
        setError(`Signed in as ${info.email || "unknown"}, but this app is set up for ${config.allowedEmail}. Signed out.`);
        return;
      }
      setError("");
      setSignedIn(true);
    } catch (e) {
      setError("Could not verify the signed-in account: " + e.message);
    }
  }

  function reconnect() {
    if (!tokenClientReadyRef.current) return;
    setError("");
    requestToken(true);
  }

  async function loadData(folderId) {
    try {
      const file = await driveFindFile(folderId, DATA_FILE_NAME);
      let loadedApartments = [];
      let loadedTransactions = [];
      let loadedTemplates = [];
      if (file) {
        const data = await driveReadJson(file.id);
        loadedApartments = data.apartments || [];
        loadedTransactions = data.transactions || [];
        loadedTemplates = data.recurringTemplates || [];
      }
      setApartments(loadedApartments);
      setRecurringTemplates(loadedTemplates);
      const generated = generateDueRecurring(loadedTemplates, loadedTransactions);
      if (generated.length) {
        const merged = [...loadedTransactions, ...generated];
        setTransactions(merged);
        setSyncStatus(`Generated ${generated.length} recurring entr${generated.length === 1 ? "y" : "ies"}`);
        persistData(loadedApartments, merged, loadedTemplates, folderId);
      } else {
        setTransactions(loadedTransactions);
      }
      setReady(true);
    } catch (e) {
      setError("Could not load data from Drive: " + e.message);
      setReady(true);
    }
  }

  useEffect(() => {
    if (signedIn && folder) loadData(folder.id);
  }, [signedIn, folder]);

  // try silent token restore on load
  useEffect(() => {
    const saved = localStorage.getItem("vkp_token");
    if (saved && config.clientId) {
      try {
        const tok = JSON.parse(saved);
        if (tok.expiresAt > Date.now() + 60000) {
          currentToken = tok;
          onTokenGranted();
        }
      } catch {}
    }
  }, []);

  async function persistData(ap, tx, templates, folderId) {
    try {
      const file = await driveFindFile(folderId, DATA_FILE_NAME);
      const payload = { apartments: ap, transactions: tx, recurringTemplates: templates };
      if (file) await driveUpdateJson(file.id, payload);
      else await driveCreateJson(folderId, DATA_FILE_NAME, payload);
      setSyncStatus("Saved to Drive");
      syncSheet(folderId, ap, tx, (err, ssId) => {
        if (err) setSyncStatus("Saved to Drive, sheet sync failed");
        else { setSyncStatus("Saved to Drive and Sheet"); setSheetUrl(`https://docs.google.com/spreadsheets/d/${ssId}/edit`); }
      });
    } catch (e) {
      setError("Could not save to Google Drive: " + e.message + ". If this persists, click Reconnect Google.");
    }
  }

  async function persist(nextApartments, nextTransactions, nextTemplates) {
    const ap = nextApartments || apartments;
    const tx = nextTransactions || transactions;
    const templates = nextTemplates || recurringTemplates;
    if (nextApartments) setApartments(nextApartments);
    if (nextTransactions) setTransactions(nextTransactions);
    if (nextTemplates) setRecurringTemplates(nextTemplates);
    if (!folder) return;
    await persistData(ap, tx, templates, folder.id);
  }

  function addApartment(data) { persist([...apartments, { id: uid(), ...data }], null, null); setShowApartmentForm(false); }
  function updateApartment(id, data) { persist(apartments.map((a) => (a.id === id ? { ...a, ...data } : a)), null, null); setEditingApartment(null); }
  function deleteApartment(id) { persist(apartments.filter((a) => a.id !== id), transactions.filter((t) => t.apartmentId !== id), null); }

  async function addTransaction(data, recurringSeed) {
    let attachmentFields = {};
    if (data.__uploadFile) {
      try {
        const receiptsFolderId = await findOrCreateFolder(folder.id, "Receipts");
        const uploaded = await driveUploadBinary(receiptsFolderId, data.__uploadFile.name, data.__uploadFile.mimeType, data.__uploadFile.buffer);
        attachmentFields = { attachmentFileId: uploaded.id, attachmentName: data.__uploadFile.name, attachmentUrl: uploaded.webViewLink || "" };
      } catch (e) {
        setError("Transaction will be saved, but the receipt upload failed: " + e.message);
      }
    }
    const clean = { ...data };
    delete clean.__uploadFile;
    const txId = uid();
    let nextTemplates = recurringTemplates;
    if (recurringSeed) {
      const templateId = uid();
      const template = {
        id: templateId, apartmentId: clean.apartmentId, type: clean.type, category: clean.category,
        amount: clean.amount, description: clean.description, dayOfMonth: recurringSeed.dayOfMonth,
        startMonth: recurringSeed.startMonth, endMonth: recurringSeed.endMonth, active: true,
      };
      nextTemplates = [...recurringTemplates, template];
      clean.recurringId = templateId;
    }
    const newTx = { id: txId, ...clean, ...attachmentFields };
    persist(null, [...transactions, newTx], recurringSeed ? nextTemplates : null);
    setShowTxForm(false);
  }
  function deleteTransaction(id) { persist(null, transactions.filter((t) => t.id !== id), null); }
  function updateRecurringTemplate(id, patch) {
    persist(null, null, recurringTemplates.map((t) => (t.id === id ? { ...t, ...patch } : t)));
  }
  function deleteRecurringTemplate(id) {
    persist(null, null, recurringTemplates.filter((t) => t.id !== id));
  }

  const years = useMemo(() => {
    const s = new Set(transactions.map((t) => new Date(t.date).getFullYear()));
    s.add(new Date().getFullYear());
    return Array.from(s).sort((a, b) => b - a);
  }, [transactions]);

  function apartmentTotals(apartmentId, y) {
    const rows = transactions.filter((t) => t.apartmentId === apartmentId && new Date(t.date).getFullYear() === y);
    const income = rows.filter((t) => t.type === "income").reduce((s, t) => s + Number(t.amount), 0);
    const expense = rows.filter((t) => t.type === "expense").reduce((s, t) => s + Number(t.amount), 0);
    return { income, expense, net: income - expense };
  }

  if (!config.clientId || !config.apiKey || !signedIn || !folder) {
    return (
      <SetupScreen
        config={config}
        signedIn={signedIn}
        error={error}
        onConfigSaved={(patch) => setConfig(saveConfig(patch))}
        onFolderChosen={(f) => { setFolder(f); saveConfig({ folderId: f.id, folderName: f.name }); }}
      />
    );
  }

  if (!ready) {
    return <div className="min-h-screen flex items-center justify-center text-sm" style={{ color: MUTE }}>Loading from Drive...</div>;
  }

  return (
    <div className="min-h-screen">
      <header className="border-b" style={{ borderColor: LINE, background: CARD }}>
        <div className="max-w-5xl mx-auto px-5 py-5 flex items-center justify-between flex-wrap gap-2">
          <div>
            <div className="text-base font-semibold tracking-tight" style={{ color: INK }}>Vuokrakirjanpito</div>
            <div className="text-xs" style={{ color: MUTE }}>
              Folder: {folder.name} {syncStatus && <span> - {syncStatus}</span>}
            </div>
          </div>
          <div className="flex items-center gap-2">
            <button onClick={reconnect} className="px-2 py-1 rounded text-xs border" style={{ borderColor: LINE, color: MUTE }}>
              Reconnect Google
            </button>
            <select value={year} onChange={(e) => setYear(Number(e.target.value))} className="px-3 py-2 rounded border text-sm font-mono" style={{ borderColor: LINE, color: INK }}>
              {years.map((y) => <option key={y} value={y}>{y}</option>)}
            </select>
          </div>
        </div>
        <nav className="max-w-5xl mx-auto px-5 flex gap-1 flex-wrap">
          {[["overview", "Overview"], ["transactions", "Transactions"], ["apartments", "Apartments"], ["tax", "Tax report"]].map(([id, label]) => (
            <button key={id} onClick={() => setTab(id)} className="px-4 py-2.5 text-sm font-medium border-b-2"
              style={{ borderColor: tab === id ? TEAL : "transparent", color: tab === id ? INK : MUTE }}>
              {label}
            </button>
          ))}
        </nav>
      </header>

      <main className="max-w-5xl mx-auto px-5 py-8">
        {error && <div className="mb-4 px-3 py-2 rounded text-sm" style={{ background: "#FBEAE5", color: RUST }}>{error}</div>}

        {tab === "overview" && <OverviewTab apartments={apartments} year={year} apartmentTotals={apartmentTotals} onAddApartment={() => setShowApartmentForm(true)} />}
        {tab === "transactions" && (
          <TransactionsTab apartments={apartments} transactions={transactions} filterApartmentId={txApartmentFilter}
            setFilterApartmentId={setTxApartmentFilter} year={year} onAdd={() => setShowTxForm(true)} onDelete={deleteTransaction}
            onManageRecurring={() => setShowRecurringModal(true)} recurringCount={recurringTemplates.filter((t) => t.active).length} />
        )}
        {tab === "apartments" && (
          <ApartmentsTab apartments={apartments} year={year} apartmentTotals={apartmentTotals}
            onAdd={() => setShowApartmentForm(true)} onEdit={(a) => setEditingApartment(a)} onDelete={deleteApartment} />
        )}
        {tab === "tax" && (
          <TaxReportTab apartments={apartments} transactions={transactions} year={year} taxApartmentId={taxApartmentId}
            setTaxApartmentId={setTaxApartmentId} sheetUrl={sheetUrl} />
        )}
      </main>

      {showApartmentForm && <ApartmentFormModal onClose={() => setShowApartmentForm(false)} onSave={addApartment} />}
      {editingApartment && <ApartmentFormModal initial={editingApartment} onClose={() => setEditingApartment(null)} onSave={(data) => updateApartment(editingApartment.id, data)} />}
      {showTxForm && (
        <TransactionFormModal apartments={apartments} defaultApartmentId={txApartmentFilter !== "all" ? txApartmentFilter : apartments[0]?.id}
          geminiApiKey={config.apiKey} onClose={() => setShowTxForm(false)} onSave={addTransaction} />
      )}
      {showRecurringModal && (
        <RecurringModal apartments={apartments} templates={recurringTemplates} onClose={() => setShowRecurringModal(false)}
          onUpdate={updateRecurringTemplate} onDelete={deleteRecurringTemplate} />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
