    defaultValue: "income",

function getCategorySection(categoryId, apartment) {
  const config = CONFIGURABLE_SECTION[categoryId];
  if (!config) {
    const cat = EXPENSE_CATEGORIES.find((c) => c.id === categoryId);
    return cat ? cat.section : "deductible";
  }
  const chosen = apartment?.[config.settingKey] || config.defaultValue;
  const opt = config.options.find((o) => o.value === chosen);
  return opt ? opt.section : "deductible";
}

const ALL_CATEGORIES = [...INCOME_CATEGORIES, ...EXPENSE_CATEGORIES];

const catEn = (id) => (ALL_CATEGORIES.find((c) => c.id === id) || {}).en || "";
const categoryLabelFor = (c, apartment) => {
  if (c.id === "erityisvastike" && apartment?.erityisvastikeDescription) {
    return `${c.fi} (${apartment.erityisvastikeDescription})`;
  }
  return `${c.fi} (${c.en})`;
};

function makeT(lang) {
  return function (key, vars) {
    let s = (TRANSLATIONS[lang] && TRANSLATIONS[lang][key]) || TRANSLATIONS.en[key] || key;
    if (vars) Object.keys(vars).forEach((k) => { s = s.replace("{" + k + "}", vars[k]); });
    return s;
  };
}

/* ---------- Google auth + Drive + Sheets ---------- */
const SCOPES = "https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/userinfo.email";
const DRIVE = "https://www.googleapis.com/drive/v3";
const UPLOAD = "https://www.googleapis.com/upload/drive/v3";
const SHEETS = "https://sheets.googleapis.com/v4/spreadsheets";
const DATA_FILE_NAME = "vuokrakirjanpito-data.json";
const SHEET_FILE_NAME = "Vuokrakirjanpito data";

function loadConfig() {
  try {
    return JSON.parse(localStorage.getItem("vkp_config") || "{}");
  } catch {
    return {};
  }
}
function saveConfig(patch) {
  const next = { ...loadConfig(), ...patch };
  localStorage.setItem("vkp_config", JSON.stringify(next));
  return next;
}

let tokenClient = null;
let currentToken = null; // { access_token, expiresAt }

function authHeaders() {
  return { Authorization: `Bearer ${currentToken.access_token}` };
}

function tokenValid() {
  return currentToken && currentToken.expiresAt > Date.now() + 60000;
}

function initTokenClient(clientId, onGranted) {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: clientId,
    scope: SCOPES,
    callback: (resp) => {
      if (resp.error) return;
      currentToken = { access_token: resp.access_token, expiresAt: Date.now() + resp.expires_in * 1000 };
      localStorage.setItem("vkp_token", JSON.stringify(currentToken));
      onGranted();
    },
  });
}
function requestToken(interactive) {
  tokenClient.requestAccessToken({ prompt: interactive ? "consent" : "" });
}

async function driveFindFile(folderId, name) {
  const q = encodeURIComponent(`'${folderId}' in parents and name='${name.replace(/'/g, "\\'")}' and trashed=false`);
  const res = await fetch(`${DRIVE}/files?q=${q}&fields=files(id,name)`, { headers: authHeaders() });
  const data = await res.json();
  return (data.files && data.files[0]) || null;
}
async function driveReadJson(fileId) {
  const res = await fetch(`${DRIVE}/files/${fileId}?alt=media`, { headers: authHeaders() });
  return res.json();
}
async function driveCreateJson(folderId, name, obj) {
  const boundary = "vkpboundary";
  const metadata = { name, parents: [folderId], mimeType: "application/json" };
  const body =
    `--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${JSON.stringify(metadata)}\r\n` +
    `--${boundary}\r\nContent-Type: application/json\r\n\r\n${JSON.stringify(obj)}\r\n--${boundary}--`;
  const res = await fetch(`${UPLOAD}/files?uploadType=multipart&fields=id`, {
    method: "POST",
    headers: { ...authHeaders(), "Content-Type": `multipart/related; boundary=${boundary}` },
    body,
  });
  return res.json();
}
async function driveUpdateJson(fileId, obj) {
  await fetch(`${UPLOAD}/files/${fileId}?uploadType=media`, {
    method: "PATCH",
    headers: { ...authHeaders(), "Content-Type": "application/json" },
    body: JSON.stringify(obj),
  });
}
async function driveAddParent(fileId, folderId) {
  await fetch(`${DRIVE}/files/${fileId}?addParents=${folderId}&fields=id`, { method: "PATCH", headers: authHeaders() });
}

async function driveListFolderFiles(folderId) {
  const q = encodeURIComponent(
    `'${folderId}' in parents and trashed=false and (mimeType contains 'image/' or mimeType='application/pdf')`
  );
  const res = await fetch(`${DRIVE}/files?q=${q}&fields=files(id,name,mimeType,webViewLink)&pageSize=1000`, { headers: authHeaders() });
  const data = await res.json();
  return data.files || [];
}
async function driveReadFileBytes(fileId) {
  const res = await fetch(`${DRIVE}/files/${fileId}?alt=media`, { headers: authHeaders() });
  return res.arrayBuffer();
}

function extractFolderId(input) {
  const s = input.trim();
  const m = s.match(/folders\/([a-zA-Z0-9_-]+)/);
  if (m) return m[1];
  const m2 = s.match(/[?&]id=([a-zA-Z0-9_-]+)/);
  if (m2) return m2[1];
  if (/^[a-zA-Z0-9_-]{10,}$/.test(s)) return s;
  return null;
}
async function fetchFolderMeta(folderId) {
  const res = await fetch(`${DRIVE}/files/${folderId}?fields=id,name,mimeType`, { headers: authHeaders() });
  if (!res.ok) {
    const body = await res.json().catch(() => ({}));
    throw new Error(body?.error?.message || `Drive returned ${res.status}`);
  }
  const data = await res.json();
  if (data.mimeType !== "application/vnd.google-apps.folder") throw new Error("That link is not a folder.");
  return { id: data.id, name: data.name };
}

function arrayBufferToBase64(buffer) {
  let binary = "";
  const bytes = new Uint8Array(buffer);
  const chunkSize = 0x8000;
  for (let i = 0; i < bytes.length; i += chunkSize) {
    binary += String.fromCharCode.apply(null, bytes.subarray(i, i + chunkSize));
  }
  return btoa(binary);
}

async function driveFindFolder(parentId, name) {
  const q = encodeURIComponent(
    `'${parentId}' in parents and name='${name.replace(/'/g, "\\'")}' and mimeType='application/vnd.google-apps.folder' and trashed=false`
  );
  const res = await fetch(`${DRIVE}/files?q=${q}&fields=files(id,name)`, { headers: authHeaders() });
  const data = await res.json();
  return (data.files && data.files[0]) || null;
}
async function driveCreateFolder(parentId, name) {
  const res = await fetch(`${DRIVE}/files?fields=id`, {
    method: "POST",
    headers: { ...authHeaders(), "Content-Type": "application/json" },
    body: JSON.stringify({ name, mimeType: "application/vnd.google-apps.folder", parents: [parentId] }),
  });
  return res.json();
}
async function findOrCreateFolder(parentId, name) {
  const existing = await driveFindFolder(parentId, name);
  if (existing) return existing.id;
  const created = await driveCreateFolder(parentId, name);
  return created.id;
}
async function driveUploadBinary(folderId, filename, mimeType, arrayBuffer) {
  const base64 = arrayBufferToBase64(arrayBuffer);
  const boundary = "vkpboundary2";
  const metadata = { name: filename, parents: [folderId] };
  const body =
    `--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${JSON.stringify(metadata)}\r\n` +
    `--${boundary}\r\nContent-Type: ${mimeType}\r\nContent-Transfer-Encoding: base64\r\n\r\n${base64}\r\n--${boundary}--`;
  const res = await fetch(`${UPLOAD}/files?uploadType=multipart&fields=id,webViewLink`, {
    method: "POST",
    headers: { ...authHeaders(), "Content-Type": `multipart/related; boundary=${boundary}` },
    body,
  });
  return res.json();
}

/* ---------- recurring transactions ---------- */
const monthKey = (isoDate) => isoDate.slice(0, 7);
function addMonths(ym, n) {
  const [y, m] = ym.split("-").map(Number);
  const d = new Date(y, m - 1 + n, 1);
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`;
}
function daysInMonth(y, m) {
  return new Date(y, m, 0).getDate();
}
function generateDueRecurring(templates, transactions) {
  const now = new Date();
  const currentMonth = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, "0")}`;
  const newTx = [];
  for (const t of templates) {
    if (!t.active) continue;
    let cursor = t.startMonth;
    const endMonth = t.endMonth && t.endMonth < currentMonth ? t.endMonth : currentMonth;
    let guard = 0;
    while (cursor <= endMonth && guard < 600) {
      guard++;
      const already = transactions.some((tx) => tx.recurringId === t.id && monthKey(tx.date) === cursor);
      if (!already) {
        const [y, m] = cursor.split("-").map(Number);
        const day = Math.min(t.dayOfMonth || 1, daysInMonth(y, m));
        const date = `${cursor}-${String(day).padStart(2, "0")}`;
        newTx.push({
          id: uid(), apartmentId: t.apartmentId, type: t.type, category: t.category,
          date, amount: t.amount, description: t.description || "", recurringId: t.id,
        });
      }
      cursor = addMonths(cursor, 1);
    }
  }
  return newTx;
}

/* For budget display only, never persisted. Fills every month of the given year that an active
   recurring series covers but that has no actual transaction yet, past or future. */
function projectedTransactionsForYear(templates, transactions, year) {
  const jan = `${year}-01`;
  const dec = `${year}-12`;
  const out = [];
  for (const t of templates) {
    if (!t.active) continue;
    let cursor = t.startMonth > jan ? t.startMonth : jan;
    const end = t.endMonth && t.endMonth < dec ? t.endMonth : dec;
    let guard = 0;
    while (cursor <= end && guard < 12) {
      guard++;
      const already = transactions.some((tx) => tx.recurringId === t.id && monthKey(tx.date) === cursor);
      if (!already) {
        const [y, m] = cursor.split("-").map(Number);
        const day = Math.min(t.dayOfMonth || 1, daysInMonth(y, m));
        out.push({
          id: `proj-${t.id}-${cursor}`, apartmentId: t.apartmentId, type: t.type, category: t.category,
          date: `${cursor}-${String(day).padStart(2, "0")}`, amount: t.amount, description: t.description || "",
          recurringId: t.id, projected: true,
        });
      }
      cursor = addMonths(cursor, 1);
    }
  }
  return out;
}

async function extractReceiptWithGemini(apiKey, base64, mimeType) {
  const categoryList = ALL_CATEGORIES.map((c) => `${c.id}: ${c.fi} / ${c.en}`).join("\n");
  const prompt =
    "You are extracting structured data from a rental-property receipt or invoice for a Finnish landlord's bookkeeping app.\n" +
    "Return ONLY compact JSON, no markdown, no explanation, matching exactly this shape:\n" +
    '{"type":"income"|"expense","category":"<one id from the list below>","date":"YYYY-MM-DD","amount":<plain number, EUR>,"description":"<short text, vendor or purpose>"}\n' +
    "Category ids you must choose from:\n" + categoryList + "\n" +
    'If unsure of category, use "muu_kulu" for costs or "other_income" for income. Amount must be a plain number with no currency symbol.';
  const body = { contents: [{ parts: [{ text: prompt }, { inline_data: { mime_type: mimeType, data: base64 } }] }] };
  const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent`, {
    method: "POST",
    headers: { "Content-Type": "application/json", "x-goog-api-key": apiKey },
    body: JSON.stringify(body),
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message || "Gemini request failed");
  const text = data?.candidates?.[0]?.content?.parts?.[0]?.text || "";
  const cleaned = text.replace(/```json|```/g, "").trim();
  return JSON.parse(cleaned);
}

/* Estimates a company loan share (yhtiolainaosuus) balance forward from a known reference point.
   Uses standard amortizing loan math when an interest rate is given, otherwise a simple linear
   fallback. Always an estimate, real bank schedules can drift from this over time. */
function monthsBetween(fromISO, toISO) {
  const from = new Date(fromISO);
  const to = new Date(toISO);
  return (to.getFullYear() - from.getFullYear()) * 12 + (to.getMonth() - from.getMonth());
}
function estimateLoanBalance(loan, asOfISO) {
  const months = monthsBetween(loan.referenceDate, asOfISO);
  if (months <= 0) return { balance: Number(loan.referenceBalance) || 0, monthsElapsed: 0 };
  let balance = Number(loan.referenceBalance) || 0;
  const payment = Number(loan.monthlyPayment) || 0;
  const rate = Number(loan.annualRatePercent);
  let elapsed = 0;
  if (rate > 0) {
    const monthlyRate = rate / 100 / 12;
    for (let i = 0; i < months && balance > 0; i++) {
      const interest = balance * monthlyRate;
      const principal = payment - interest;
      balance = Math.max(0, balance - principal);
      elapsed++;
    }
  } else {
    balance = Math.max(0, balance - payment * months);
    elapsed = months;
  }
  return { balance, monthsElapsed: elapsed };
}

/* Walks the same amortization schedule as estimateLoanBalance but returns the interest/principal
   split for one specific calendar year, and the balance at the start and end of that year.
   Used for the personal financing (oma rahoitus) section of the profitability analysis. */
function annualDebtService(loan, year) {
  const startDate = new Date(loan.referenceDate);
  const yearStart = new Date(year, 0, 1);
  const yearEnd = new Date(year, 11, 31);
  if (startDate > yearEnd) return { interest: 0, principal: 0, balanceStart: Number(loan.referenceBalance) || 0, balanceEnd: Number(loan.referenceBalance) || 0 };

  let balance = Number(loan.referenceBalance) || 0;
  const payment = Number(loan.monthlyPayment) || 0;
  const rate = Number(loan.annualRatePercent) || 0;
  const monthlyRate = rate / 100 / 12;
  let interestThisYear = 0;
  let principalThisYear = 0;
  let balanceStart = balance;
  let cursor = new Date(startDate.getFullYear(), startDate.getMonth(), 1);
  let guard = 0;
  let capturedStart = startDate >= yearStart;
  while (balance > 0 && cursor <= yearEnd && guard < 1200) {
    guard++;
    const inTargetYear = cursor.getFullYear() === year;
    if (inTargetYear && cursor >= yearStart && !capturedStart) { balanceStart = balance; capturedStart = true; }
    const interest = rate > 0 ? balance * monthlyRate : 0;
    const principal = rate > 0 ? payment - interest : payment;
    const actualPrincipal = Math.min(principal, balance);
    if (inTargetYear) {
      interestThisYear += interest;
      principalThisYear += actualPrincipal;
    }
    balance = Math.max(0, balance - actualPrincipal);
    cursor = new Date(cursor.getFullYear(), cursor.getMonth() + 1, 1);
  }
  return { interest: interestThisYear, principal: principalThisYear, balanceStart, balanceEnd: balance };
}

function computeApartmentYear(apartment, transactions, year) {
  const rows = transactions.filter((t) => t.apartmentId === apartment.id && new Date(t.date).getFullYear() === year);
  const byCategory = {};
  for (const c of ALL_CATEGORIES) byCategory[c.id] = 0;
  for (const r of rows) byCategory[r.category] += Number(r.amount);
  const incomeTotal = INCOME_CATEGORIES.reduce((s, c) => s + byCategory[c.id], 0);
  const deductibleCategories = EXPENSE_CATEGORIES.filter((c) => getCategorySection(c.id, apartment) === "deductible");
  const capitalizedCategories = EXPENSE_CATEGORIES.filter((c) => getCategorySection(c.id, apartment) === "capitalized");
  const interestCategories = EXPENSE_CATEGORIES.filter((c) => getCategorySection(c.id, apartment) === "interest");
  const expenseTotal = deductibleCategories.reduce((s, c) => s + byCategory[c.id], 0);
  const capitalizedTotal = capitalizedCategories.reduce((s, c) => s + byCategory[c.id], 0);
  const interestTotal = interestCategories.reduce((s, c) => s + byCategory[c.id], 0);
  return { byCategory, incomeTotal, expenseTotal, capitalizedTotal, interestTotal, deductibleCategories, capitalizedCategories, interestCategories, net: incomeTotal - expenseTotal };
}

/* Kannattavuuslaskelma: gross/net yield, cash flow, and cash-on-cash return, using the standard
   Finnish asuntosijoittaminen formulas. Depreciation and loan service fees are excluded from the
   yield's operating costs since they are non-cash or financing items, not running costs of the asset.
   The base figures use a normalized full calendar year at the current recurring rate (rent and
   vastikkeet annualized at their current monthly amount), not raw partial-year actuals, so a year
   with only a few months recorded so far does not distort the yield. One-off, non-recurring costs
   are counted exactly once as they actually happened, never scaled up or down. */
const YIELD_EXCLUDED_FROM_OPERATING_COSTS = ["irtaimisto_poisto", "perusparannuksen_poisto", "kalustevahennys", "lainanhoitokulut"];
function computeInvestmentAnalysis(apartment, transactions, recurringTemplates, year) {
  const projected = projectedTransactionsForYear(recurringTemplates || [], transactions, year);
  const normalized = [...transactions, ...projected];
  const r = computeApartmentYear(apartment, normalized, year);
  const operatingCostCategories = r.deductibleCategories.filter((c) => YIELD_EXCLUDED_FROM_OPERATING_COSTS.indexOf(c.id) === -1);
  const operatingCosts = operatingCostCategories.reduce((s, c) => s + r.byCategory[c.id], 0);
  const debtFreePrice = Number(apartment.debtFreePrice) || Number(apartment.purchasePrice) || 0;
  const grossYieldPercent = debtFreePrice > 0 ? (r.incomeTotal / debtFreePrice) * 100 : null;
  const netYieldPercent = debtFreePrice > 0 ? ((r.incomeTotal - operatingCosts) / debtFreePrice) * 100 : null;
  const cashFlow = r.incomeTotal - r.expenseTotal - r.interestTotal - r.capitalizedTotal;
  const ownEquity = Number(apartment.ownEquity) || null;
  const cashOnCashPercent = ownEquity ? (cashFlow / ownEquity) * 100 : null;
  return { r, operatingCosts, operatingCostCategories, debtFreePrice, grossYieldPercent, netYieldPercent, cashFlow, ownEquity, cashOnCashPercent };
}

/* Maps our categories onto the five numbered lines of the actual Vero form 7H (3011), section 2. */
function get7HLines(apartment, transactions, year) {
  const r = computeApartmentYear(apartment, transactions, year);
  const hoitoVesi = r.byCategory.hoitovastike + r.byCategory.vesimaksu;
  const tuloutetutPaaomavastikkeet =
    (getCategorySection("rahoitusvastike", apartment) === "deductible" ? r.byCategory.rahoitusvastike : 0) +
    (getCategorySection("erityisvastike", apartment) === "deductible" ? r.byCategory.erityisvastike : 0);
  const vuosikorjaus = r.byCategory.korjauskulut;
  const muutKulut = r.expenseTotal - hoitoVesi - tuloutetutPaaomavastikkeet - vuosikorjaus;
  return { r, line21: r.incomeTotal, line22: hoitoVesi, line23: tuloutetutPaaomavastikkeet, line24: vuosikorjaus, line25: muutKulut };
}

async function syncSheet(folderId, apartments, transactions, onDone) {
  try {
    const ssId = await findOrCreateSpreadsheet(folderId);
    const apRows = [
      [
        "Name", "Address", "Housing company", "Your share %",
        "Rahoitusvastike treatment", "Erityisvastike description", "Erityisvastike treatment", "Notes",
      ],
      ...apartments.map((a) => [

        rvLabelFor(a), a.erityisvastikeDescription || "", a.erityisvastikeDescription ? evLabelFor(a) : "", a.notes || "",
      ]),
    ];
    const txRows = [
      ["Apartment", "Date", "Type", "Category (FI)", "Category (EN)", "Amount EUR", "Description"],
      ...transactions
        .slice()
        .sort((a, b) => new Date(a.date) - new Date(b.date))
        .map((t) => {
          const a = apartments.find((x) => x.id === t.apartmentId);
          return [
            a ? a.name : "", t.date, t.type, catLabel(t.category), catEn(t.category), t.amount, t.description || "",

        }),
    ];
    await sheetsClearAndWrite(ssId, "Apartments", apRows);
    await sheetsClearAndWrite(ssId, "Transactions", txRows);
    onDone && onDone(null, ssId);
  } catch (e) {
    onDone && onDone(e, null);
  }

          if (data.action === google.picker.Action.PICKED) {
            const doc = data.docs[0];
            onFolderChosen({ id: doc.id, name: doc.name });
          }
        })
        .build();
      picker.setVisible(true);
    });
  }

  async function useFolderLink() {
    const id = extractFolderId(folderLink);
    if (!id) { setFolderLinkError("Could not find a folder ID in that link."); return; }
    setFolderLinkBusy(true);
    setFolderLinkError("");
    try {
      const meta = await fetchFolderMeta(id);
      onFolderChosen(meta);
    } catch (e) {
      setFolderLinkError("Could not use that folder: " + e.message);
    }
    setFolderLinkBusy(false);
  }

  const needsCreds = !config.clientId || !config.apiKey;

  return (
    <div className="min-h-screen flex items-center justify-center px-4">
      <div className="w-full max-w-md rounded-lg border p-6" style={{ borderColor: LINE, background: CARD }}>
        <div className="flex justify-end mb-2">
          <div className="flex rounded border overflow-hidden text-xs" style={{ borderColor: LINE }}>
            <button onClick={() => setLang("en")} className="px-2 py-1" style={{ background: language === "en" ? TEAL : "transparent", color: language === "en" ? "#fff" : MUTE }}>EN</button>
            <button onClick={() => setLang("fi")} className="px-2 py-1" style={{ background: language === "fi" ? TEAL : "transparent", color: language === "fi" ? "#fff" : MUTE }}>FI</button>
          </div>
        </div>
        <div className="text-base font-semibold mb-1" style={{ color: INK }}>{t("setup_title")}</div>
        <div className="text-sm mb-5" style={{ color: MUTE }}>
          {t("setup_intro")}
        </div>

        {error && (
          <div className="mb-4 px-3 py-2 rounded text-sm" style={{ background: "#FBEAE5", color: RUST }}>{error}</div>
        )}

        {needsCreds && (
          <>
            <Field label={t("setup_client_id")}>
              <input className={inputCls} style={inputStyle} value={clientId}
                placeholder="xxxxxxxx.apps.googleusercontent.com"
                onChange={(e) => setClientId(e.target.value)} />
            </Field>
            <Field label={t("setup_api_key")}>
              <input className={inputCls} style={inputStyle} value={apiKey}
                placeholder="AIza..." onChange={(e) => setApiKey(e.target.value)} />
            </Field>
            <Field label={t("setup_email")}>
              <input className={inputCls} style={inputStyle} value={allowedEmail}
                placeholder="you@gmail.com" onChange={(e) => setAllowedEmail(e.target.value)} />
            </Field>
            <div className="text-xs mb-3" style={{ color: MUTE }}>
              {t("setup_email_note")}
            </div>
            <button onClick={saveCreds} disabled={!clientId.trim() || !apiKey.trim() || !allowedEmail.trim()}
              className="w-full py-2.5 rounded text-sm font-medium disabled:opacity-40"
              style={{ background: TEAL, color: "#fff" }}>
              {t("setup_save")}
            </button>
          </>
        )}

        {!needsCreds && !signedIn && (
          <button onClick={connect} disabled={!gapiReady || busy}
            className="w-full py-2.5 rounded text-sm font-medium disabled:opacity-40"
            style={{ background: TEAL, color: "#fff" }}>
            {gapiReady ? t("setup_connect") : t("setup_loading_google")}
          </button>
        )}

        {!needsCreds && signedIn && (
          <>
            <button onClick={pickFolder} className="w-full py-2.5 rounded text-sm font-medium" style={{ background: TEAL, color: "#fff" }}>
              {t("setup_choose_folder")}
            </button>
            <div className="text-xs text-center my-2" style={{ color: MUTE }}>{t("setup_or_paste")}</div>
            <Field label={t("setup_paste_folder_link")}>
              <input className={inputCls} style={inputStyle} value={folderLink}
                placeholder="https://drive.google.com/drive/folders/..."
                onChange={(e) => setFolderLink(e.target.value)} />
            </Field>
            {folderLinkError && <div className="text-xs mb-2" style={{ color: RUST }}>{folderLinkError}</div>}
            <button onClick={useFolderLink} disabled={!folderLink.trim() || folderLinkBusy}
              className="w-full py-2 rounded text-sm font-medium border disabled:opacity-40" style={{ borderColor: LINE, color: INK }}>
              {folderLinkBusy ? t("setup_checking") : t("setup_use_this_folder")}
            </button>
            <div className="text-xs mt-1" style={{ color: MUTE }}>
              {t("setup_paste_note")}
            </div>
          </>
        )}

        {!needsCreds && (
          <button
            onClick={() => { localStorage.removeItem("vkp_config"); localStorage.removeItem("vkp_token"); window.location.reload(); }}
            className="w-full mt-3 py-2 rounded text-xs" style={{ color: MUTE }}
          >
            {t("setup_reset_creds")}
          </button>
        )}
      </div>
    </div>
  );
}

/* ---------- Settings, non-destructive credential and folder updates ---------- */
function SettingsModal({ config, folder, onClose, onSave, onPickFolder, onFolderLink, onSignOut, onResetEverything, t }) {
  const [clientId, setClientId] = useState(config.clientId || "");
  const [apiKey, setApiKey] = useState(config.apiKey || "");
  const [geminiApiKey, setGeminiApiKey] = useState(config.geminiApiKey || "");
  const [allowedEmail, setAllowedEmail] = useState(config.allowedEmail || "");
  const [filerName, setFilerName] = useState(config.filerName || "");
  const [saved, setSaved] = useState(false);
  const [folderLink, setFolderLink] = useState("");
  const [folderLinkError, setFolderLinkError] = useState("");
  const [folderLinkBusy, setFolderLinkBusy] = useState(false);

  function save() {
    onSave({
      clientId: clientId.trim(), apiKey: apiKey.trim(),
      geminiApiKey: geminiApiKey.trim(), allowedEmail: allowedEmail.trim(), filerName: filerName.trim(),
    });
    setSaved(true);
    setTimeout(() => setSaved(false), 2500);
  }

  async function useFolderLink() {
    const id = extractFolderId(folderLink);
    if (!id) { setFolderLinkError("Could not find a folder ID in that link."); return; }
    setFolderLinkBusy(true);
    setFolderLinkError("");
    try {
      const meta = await fetchFolderMeta(id);
      onFolderLink(meta);
    } catch (e) {
      setFolderLinkError("Could not use that folder: " + e.message);
    }
    setFolderLinkBusy(false);
  }

  return (
    <Modal onClose={onClose} title={t("settings_title")}>
      <Field label="Google OAuth Client ID">
        <input className={inputCls} style={inputStyle} value={clientId} onChange={(e) => setClientId(e.target.value)} />
      </Field>
      <Field label="Google API key (Drive and Picker)">
        <input className={inputCls} style={inputStyle} value={apiKey} onChange={(e) => setApiKey(e.target.value)} />
      </Field>
      <Field label="Gemini API key (Auth key from Google AI Studio), optional">
        <input className={inputCls} style={inputStyle} value={geminiApiKey} onChange={(e) => setGeminiApiKey(e.target.value)} />
      </Field>
      <Field label="Your Google account email">
        <input className={inputCls} style={inputStyle} value={allowedEmail} onChange={(e) => setAllowedEmail(e.target.value)} />
      </Field>
      <Field label="Your name, for the 7H summary PDF, optional">
        <input className={inputCls} style={inputStyle} value={filerName} onChange={(e) => setFilerName(e.target.value)} />
      </Field>
      <button onClick={save} className="w-full py-2.5 rounded text-sm font-medium" style={{ background: TEAL, color: "#fff" }}>
        {saved ? t("settings_saved") : t("settings_save")}
      </button>
      <div className="text-xs mt-1" style={{ color: MUTE }}>
        {t("settings_reconnect_note")}
      </div>

      <div className="mt-4 pt-4 border-t" style={{ borderColor: LINE }}>
        <div className="text-xs mb-2" style={{ color: MUTE }}>{t("settings_current_folder")}: {folder?.name || "none"}</div>
        <button onClick={onPickFolder} className="w-full py-2 rounded text-sm font-medium border mb-2" style={{ borderColor: LINE, color: INK }}>
          {t("settings_change_folder")}
        </button>
        <div className="text-xs text-center mb-2" style={{ color: MUTE }}>{t("settings_or_paste")}</div>
        <Field label={t("settings_paste_folder_link")}>
          <input className={inputCls} style={inputStyle} value={folderLink}
            placeholder="https://drive.google.com/drive/folders/..."
            onChange={(e) => setFolderLink(e.target.value)} />
        </Field>
        {folderLinkError && <div className="text-xs mb-2" style={{ color: RUST }}>{folderLinkError}</div>}
        <button onClick={useFolderLink} disabled={!folderLink.trim() || folderLinkBusy}
          className="w-full py-2 rounded text-sm font-medium border mb-2 disabled:opacity-40" style={{ borderColor: LINE, color: INK }}>
          {folderLinkBusy ? t("settings_checking") : t("settings_use_this_folder")}
        </button>
        <button onClick={onSignOut} className="w-full py-2 rounded text-sm font-medium border mb-2" style={{ borderColor: LINE, color: INK }}>
          {t("settings_sign_out")}
        </button>
        <button onClick={() => { if (confirm(t("settings_reset_confirm"))) onResetEverything(); }}
          className="w-full py-2 rounded text-sm" style={{ color: RUST }}>
          {t("settings_reset")}
        </button>
      </div>
    </Modal>
  );
}

/* ---------- Apartment form ---------- */
function ApartmentFormModal({ initial, onClose, onSave, t, lang, geminiApiKey, onSaveGeminiKey }) {
  const [form, setForm] = useState(
    initial || {
      name: "", address: "", housingCompany: "", companyId: "", unitNumber: "", sharePercent: 50,
      rahoitusvastikeTreatment: "income", erityisvastikeDescription: "", erityisvastikeTreatment: "income",
      notes: "", loans: [],
      purchasePrice: "", debtFreePrice: "", purchaseDate: "", acquisitionCosts: "", ownEquity: "",
      personalLoanAmount: "", personalLoanStartDate: "", personalLoanPayment: "", personalLoanRate: "",
    }
  );
  const rvConfig = CONFIGURABLE_SECTION.rahoitusvastike;
  const evConfig = CONFIGURABLE_SECTION.erityisvastike;
  const optLabel = (o) => (lang === "fi" ? o.labelFi : o.label);
  const loans = form.loans || [];
  function addLoan() {
    setForm({ ...form, loans: [...loans, { id: uid(), name: "", referenceBalance: "", referenceDate: new Date().toISOString().slice(0, 10), monthlyPayment: "", annualRatePercent: "" }] });
  }
  function updateLoan(id, patch) {
    setForm({ ...form, loans: loans.map((l) => (l.id === id ? { ...l, ...patch } : l)) });
  }
  function removeLoan(id) {
    setForm({ ...form, loans: loans.filter((l) => l.id !== id) });
  }
  const [docFile, setDocFile] = useState(null);
  const [docScanning, setDocScanning] = useState(false);
  const [docError, setDocError] = useState("");
  const [geminiKeyInput, setGeminiKeyInput] = useState("");

  async function scanDocument() {
    if (!docFile) return;
    setDocScanning(true);
    setDocError("");
    try {
      const buf = await docFile.arrayBuffer();
      const base64 = arrayBufferToBase64(buf);
      const extracted = await extractApartmentInfoWithGemini(geminiApiKey, base64, docFile.type || "application/pdf");
      const scannedLoans = (extracted.loans || [])
        .filter((l) => l && l.name && l.referenceBalance != null && l.referenceDate)
        .map((l) => ({
          id: uid(), name: l.name, referenceBalance: String(l.referenceBalance), referenceDate: l.referenceDate,
          monthlyPayment: l.monthlyPayment != null ? String(l.monthlyPayment) : "",
          annualRatePercent: l.annualRatePercent != null ? String(l.annualRatePercent) : "",
        }));
      setForm({
        ...form,
        housingCompany: extracted.housingCompany || form.housingCompany,
        companyId: extracted.companyId || form.companyId,
        unitNumber: extracted.unitNumber || form.unitNumber,
        address: extracted.address || form.address,
        notes: extracted.summary ? (form.notes ? `${form.notes}\n${extracted.summary}` : extracted.summary) : form.notes,
        loans: scannedLoans.length ? scannedLoans : (form.loans || []),
        purchasePrice: extracted.purchasePrice != null ? String(extracted.purchasePrice) : form.purchasePrice,
        debtFreePrice: extracted.debtFreePrice != null ? String(extracted.debtFreePrice) : form.debtFreePrice,
        purchaseDate: extracted.purchaseDate || form.purchaseDate,
        acquisitionCosts: extracted.acquisitionCosts != null ? String(extracted.acquisitionCosts) : form.acquisitionCosts,
        personalLoanAmount: extracted.personalLoan?.originalAmount != null ? String(extracted.personalLoan.originalAmount) : form.personalLoanAmount,
        personalLoanStartDate: extracted.personalLoan?.startDate || form.personalLoanStartDate,
        personalLoanPayment: extracted.personalLoan?.monthlyPayment != null ? String(extracted.personalLoan.monthlyPayment) : form.personalLoanPayment,
        personalLoanRate: extracted.personalLoan?.annualRatePercent != null ? String(extracted.personalLoan.annualRatePercent) : form.personalLoanRate,
      });
    } catch (e) {
      setDocError((lang === "fi" ? "Asiakirjan lukeminen epäonnistui: " : "Could not read the document: ") + e.message);
    }
    setDocScanning(false);
  }

  return (
    <Modal onClose={onClose} title={initial ? t("apt_edit") : t("apt_add")}>
      <Field label={t("apt_field_import_doc")}>
        <input type="file" accept="image/*,application/pdf" className={inputCls} style={inputStyle}
          onChange={(e) => { setDocFile(e.target.files[0] || null); setDocError(""); }} />
      </Field>
      {docFile && geminiApiKey && (
        <div className="mb-3">
          <button onClick={scanDocument} disabled={docScanning} type="button"
            className="w-full py-2 rounded text-sm font-medium border disabled:opacity-50"
            style={{ borderColor: TEAL, color: TEAL }}>
            {docScanning ? t("tx_reading_receipt") : t("apt_fill_from_doc")}
          </button>
          {docError && <div className="text-xs mt-1" style={{ color: RUST }}>{docError}</div>}
          <div className="text-xs mt-1" style={{ color: MUTE }}>{t("tx_review_note")}</div>
        </div>
      )}
      {docFile && !geminiApiKey && (
        <div className="mb-3 px-3 py-2 rounded border" style={{ borderColor: LINE }}>
          <div className="text-xs mb-2" style={{ color: MUTE }}>{t("tx_add_gemini_key_note")}</div>
          <input className={inputCls} style={inputStyle} value={geminiKeyInput} placeholder="AIza... (from Google AI Studio)"
            onChange={(e) => setGeminiKeyInput(e.target.value)} />
          <button type="button" onClick={() => geminiKeyInput.trim() && onSaveGeminiKey(geminiKeyInput.trim())}
            disabled={!geminiKeyInput.trim()} className="w-full mt-2 py-1.5 rounded text-xs font-medium disabled:opacity-40"
            style={{ background: TEAL, color: "#fff" }}>
            {t("tx_save_gemini_key")}
          </button>
        </div>
      )}
      <Field label={t("apt_field_name")}>
        <input className={inputCls} style={inputStyle} value={form.name} placeholder="e.g. Mannynkerkko 2h"
          onChange={(e) => setForm({ ...form, name: e.target.value })} />
      </Field>
      <Field label={t("apt_field_address")}>
        <input className={inputCls} style={inputStyle} value={form.address} placeholder="Street, Oulu"
          onChange={(e) => setForm({ ...form, address: e.target.value })} />
      </Field>
      <Field label={t("apt_field_company")}>
        <input className={inputCls} style={inputStyle} value={form.housingCompany} placeholder="e.g. As Oy Mannynkerkko"
          onChange={(e) => setForm({ ...form, housingCompany: e.target.value })} />
      </Field>
      <div className="grid grid-cols-2 gap-3">
        <Field label={t("apt_field_company_id")}>
          <input className={inputCls} style={inputStyle} value={form.companyId || ""} placeholder="1234567-8"
            onChange={(e) => setForm({ ...form, companyId: e.target.value })} />
        </Field>
        <Field label={t("apt_field_unit_number")}>
          <input className={inputCls} style={inputStyle} value={form.unitNumber || ""} placeholder="e.g. A 4"
            onChange={(e) => setForm({ ...form, unitNumber: e.target.value })} />
        </Field>
      </div>
      <Field label={t("apt_field_share")}>
        <input type="number" min="0" max="100" className={inputCls} style={inputStyle} value={form.sharePercent}
          onChange={(e) => setForm({ ...form, sharePercent: e.target.value })} />
      </Field>
      <Field label={t("apt_field_rv_treatment")}>
        <select className={inputCls} style={inputStyle} value={form.rahoitusvastikeTreatment || rvConfig.defaultValue}
          onChange={(e) => setForm({ ...form, rahoitusvastikeTreatment: e.target.value })}>
          {rvConfig.options.map((o) => (
            <option key={o.value} value={o.value}>{optLabel(o)} {o.section === "deductible" ? `(${t("word_deductible")})` : `(${t("word_capitalized")})`}</option>
          ))}
        </select>
      </Field>
      <Field label={t("apt_field_ev_description")}>
        <input className={inputCls} style={inputStyle} value={form.erityisvastikeDescription}
          placeholder="e.g. Building internet service"
          onChange={(e) => setForm({ ...form, erityisvastikeDescription: e.target.value })} />
      </Field>
      {form.erityisvastikeDescription && (
        <Field label={t("apt_field_ev_treatment")}>
          <select className={inputCls} style={inputStyle} value={form.erityisvastikeTreatment || evConfig.defaultValue}
            onChange={(e) => setForm({ ...form, erityisvastikeTreatment: e.target.value })}>
            {evConfig.options.map((o) => (
              <option key={o.value} value={o.value}>{optLabel(o)} {o.section === "deductible" ? `(${t("word_deductible")})` : `(${t("word_capitalized")})`}</option>
            ))}
          </select>
        </Field>
      )}
      <div className="mb-3">
        <div className="text-xs mb-2" style={{ color: MUTE }}>{t("apt_loans_title")}</div>
        {loans.map((l) => (
          <div key={l.id} className="rounded border p-2 mb-2" style={{ borderColor: LINE }}>
            <input className={inputCls} style={{ ...inputStyle, marginBottom: 4 }} value={l.name} placeholder={t("apt_loan_name")}

            <div className="grid grid-cols-2 gap-1 mb-1">
              <Field label={t("apt_loan_balance")}>
                <input type="number" step="0.01" className={inputCls} style={inputStyle} value={l.referenceBalance}
                  onChange={(e) => updateLoan(l.id, { referenceBalance: e.target.value })} />
              </Field>
              <Field label={t("apt_loan_date")}>
                <input type="date" className={inputCls} style={inputStyle} value={l.referenceDate}
                  onChange={(e) => updateLoan(l.id, { referenceDate: e.target.value })} />
              </Field>
            </div>
            <div className="grid grid-cols-2 gap-1 mb-1">
              <Field label={t("apt_loan_payment")}>
                <input type="number" step="0.01" className={inputCls} style={inputStyle} value={l.monthlyPayment}
                  onChange={(e) => updateLoan(l.id, { monthlyPayment: e.target.value })} />
              </Field>
              <Field label={t("apt_loan_rate")}>
                <input type="number" step="0.01" className={inputCls} style={inputStyle} value={l.annualRatePercent}
                  onChange={(e) => updateLoan(l.id, { annualRatePercent: e.target.value })} />
              </Field>
            </div>
            <button type="button" onClick={() => removeLoan(l.id)} className="text-xs" style={{ color: RUST }}>{t("btn_delete")}</button>
          </div>
        ))}
        <button type="button" onClick={addLoan} className="w-full py-2 rounded text-sm font-medium border" style={{ borderColor: LINE, color: INK }}>
          {t("apt_loan_add")}
        </button>
        <div className="text-xs mt-1" style={{ color: MUTE }}>{t("apt_loan_note")}</div>
      </div>
      <div className="mb-3">
        <div className="text-xs mb-2" style={{ color: MUTE }}>{t("apt_invest_title")}</div>
        <div className="grid grid-cols-2 gap-1 mb-1">
          <Field label={t("apt_purchase_price")}>
            <input type="number" step="0.01" className={inputCls} style={inputStyle} value={form.purchasePrice || ""}
              onChange={(e) => setForm({ ...form, purchasePrice: e.target.value })} />
          </Field>
          <Field label={t("apt_debt_free_price")}>
            <input type="number" step="0.01" className={inputCls} style={inputStyle} value={form.debtFreePrice || ""}
              onChange={(e) => setForm({ ...form, debtFreePrice: e.target.value })} />
          </Field>
        </div>
        <div className="grid grid-cols-2 gap-1 mb-1">
          <Field label={t("apt_purchase_date")}>
            <input type="date" className={inputCls} style={inputStyle} value={form.purchaseDate || ""}
              onChange={(e) => setForm({ ...form, purchaseDate: e.target.value })} />
          </Field>
          <Field label={t("apt_acquisition_costs")}>
            <input type="number" step="0.01" className={inputCls} style={inputStyle} value={form.acquisitionCosts || ""}
              onChange={(e) => setForm({ ...form, acquisitionCosts: e.target.value })} />
          </Field>
        </div>
        <Field label={t("apt_own_equity")}>
          <input type="number" step="0.01" className={inputCls} style={inputStyle} value={form.ownEquity || ""}
            onChange={(e) => setForm({ ...form, ownEquity: e.target.value })} />
        </Field>
        <div className="text-xs mt-1" style={{ color: MUTE }}>{t("apt_invest_note")}</div>
      </div>
      <div className="mb-3">
        <div className="text-xs mb-2" style={{ color: MUTE }}>{t("apt_personal_loan_title")}</div>
        <div className="grid grid-cols-2 gap-1 mb-1">
          <Field label={t("apt_personal_loan_amount")}>
            <input type="number" step="0.01" className={inputCls} style={inputStyle} value={form.personalLoanAmount || ""}

            <input type="date" className={inputCls} style={inputStyle} value={form.personalLoanStartDate || ""}
              onChange={(e) => setForm({ ...form, personalLoanStartDate: e.target.value })} />
          </Field>
        </div>
        <div className="grid grid-cols-2 gap-1 mb-1">
          <Field label={t("apt_personal_loan_payment")}>
            <input type="number" step="0.01" className={inputCls} style={inputStyle} value={form.personalLoanPayment || ""}

          <Field label={t("apt_personal_loan_rate")}>
            <input type="number" step="0.01" className={inputCls} style={inputStyle} value={form.personalLoanRate || ""}
              onChange={(e) => setForm({ ...form, personalLoanRate: e.target.value })} />

        <div className="text-xs mt-1" style={{ color: MUTE }}>{t("apt_personal_loan_note")}</div>

      <Field label={t("apt_field_notes")}>
        <textarea className={inputCls} style={{ ...inputStyle, minHeight: 60 }} value={form.notes}

      </Field>
      <button onClick={() => form.name.trim() && onSave({
          ...form, sharePercent: Number(form.sharePercent) || 0,
          purchasePrice: Number(form.purchasePrice) || 0, debtFreePrice: Number(form.debtFreePrice) || 0,
          acquisitionCosts: Number(form.acquisitionCosts) || 0, ownEquity: Number(form.ownEquity) || 0,
          personalLoanAmount: Number(form.personalLoanAmount) || 0, personalLoanPayment: Number(form.personalLoanPayment) || 0,
          personalLoanRate: form.personalLoanRate ? Number(form.personalLoanRate) : null,
          loans: loans.map((l) => ({
            id: l.id, name: l.name, referenceDate: l.referenceDate,
            referenceBalance: Number(l.referenceBalance) || 0,
            monthlyPayment: Number(l.monthlyPayment) || 0,
            annualRatePercent: l.annualRatePercent ? Number(l.annualRatePercent) : null,
          })),

        disabled={!form.name.trim()} className="w-full mt-2 py-2.5 rounded text-sm font-medium disabled:opacity-40"
        style={{ background: TEAL, color: "#fff" }}>
        {t("btn_save")}

    </Modal>
  );
}

/* ---------- Transaction form ---------- */
function TransactionFormModal({ apartments, defaultApartmentId, geminiApiKey, onSaveGeminiKey, initial, onClose, onSave, t, lang }) {
  const [form, setForm] = useState(
    initial
      ? {
          apartmentId: initial.apartmentId, type: initial.type, category: initial.category,
          date: initial.date, amount: String(initial.amount), description: initial.description || "",
        }
      : {
          apartmentId: defaultApartmentId || apartments[0]?.id,
          type: "income", category: "rent", date: new Date().toISOString().slice(0, 10), amount: "", description: "",
        }
  );
  const [receiptFile, setReceiptFile] = useState(null);
  const [repeatMonthly, setRepeatMonthly] = useState(false);
  const [repeatEndMonth, setRepeatEndMonth] = useState("");
  const [scanning, setScanning] = useState(false);
  const [scanError, setScanError] = useState("");
  const [saving, setSaving] = useState(false);
  const [geminiKeyInput, setGeminiKeyInput] = useState("");

  const categories = form.type === "income" ? INCOME_CATEGORIES : EXPENSE_CATEGORIES;
  const activeCat = ALL_CATEGORIES.find((c) => c.id === form.category);
  function setType(type) {
    const firstCat = (type === "income" ? INCOME_CATEGORIES : EXPENSE_CATEGORIES)[0].id;
    setForm({ ...form, type, category: firstCat });
  }

  async function scanReceipt() {
    if (!receiptFile) return;
    setScanning(true);
    setScanError("");
    try {
      const buf = await receiptFile.arrayBuffer();
      const base64 = arrayBufferToBase64(buf);
      const extracted = await extractReceiptWithGemini(geminiApiKey, base64, receiptFile.type || "application/pdf");
      const validCategories = extracted.type === "income" ? INCOME_CATEGORIES : EXPENSE_CATEGORIES;
      const category = validCategories.find((c) => c.id === extracted.category)
        ? extracted.category
        : (extracted.type === "income" ? "other_income" : "muu_kulu");
      setForm({
        ...form,
        type: extracted.type === "income" ? "income" : "expense",
        category,
        date: extracted.date || form.date,
        amount: extracted.amount != null ? String(extracted.amount) : form.amount,
        description: extracted.description || form.description,
      });
    } catch (e) {
      setScanError((lang === "fi" ? "Kuitin lukeminen epäonnistui: " : "Could not read the receipt: ") + e.message);
    }
    setScanning(false);
  }

  async function handleSave() {
    if (!form.apartmentId || !(Number(form.amount) > 0)) return;
    setSaving(true);
    let attachment = {};
    if (receiptFile) {
      try {
        const buf = await receiptFile.arrayBuffer();
        attachment = { __uploadFile: { name: receiptFile.name, mimeType: receiptFile.type || "application/octet-stream", buffer: buf } };
      } catch (e) {
        setScanError((lang === "fi" ? "Liitteen lukeminen epäonnistui: " : "Could not read the file to attach: ") + e.message);
        setSaving(false);
        return;
      }
    } else if (initial) {
      attachment = {
        attachmentFileId: initial.attachmentFileId, attachmentName: initial.attachmentName, attachmentUrl: initial.attachmentUrl,
      };
    }
    onSave(
      { ...form, amount: Number(form.amount), ...attachment },
      !initial && repeatMonthly ? { dayOfMonth: Number(form.date.slice(8, 10)), startMonth: form.date.slice(0, 7), endMonth: repeatEndMonth || null } : null
    );
  }

  return (
    <Modal onClose={onClose} title={initial ? t("modal_edit_transaction") : t("modal_add_transaction")}>
      <Field label={t("field_apartment")}>
        <select className={inputCls} style={inputStyle} value={form.apartmentId}
          onChange={(e) => setForm({ ...form, apartmentId: e.target.value })}>
          {apartments.map((a) => <option key={a.id} value={a.id}>{a.name}</option>)}
        </select>
      </Field>

      {initial && initial.attachmentName && !receiptFile && (
        <div className="text-xs mb-2" style={{ color: MUTE }}>
          {t("tx_current_receipt")}: {initial.attachmentUrl ? (
            <a href={initial.attachmentUrl} target="_blank" rel="noreferrer" className="underline" style={{ color: TEAL }}>{initial.attachmentName}</a>
          ) : initial.attachmentName}. {t("tx_replaces_note")}
        </div>
      )}
      <Field label={initial ? t("field_receipt_replace") : t("field_receipt")}>
        <input type="file" accept="image/*,application/pdf" className={inputCls} style={inputStyle}
          onChange={(e) => { setReceiptFile(e.target.files[0] || null); setScanError(""); }} />
      </Field>
      {receiptFile && geminiApiKey && (
        <div className="mb-3">
          <button onClick={scanReceipt} disabled={scanning} type="button"
            className="w-full py-2 rounded text-sm font-medium border disabled:opacity-50"
            style={{ borderColor: TEAL, color: TEAL }}>
            {scanning ? t("tx_reading_receipt") : t("tx_fill_from_receipt")}
          </button>
          {scanError && <div className="text-xs mt-1" style={{ color: RUST }}>{scanError}</div>}
          <div className="text-xs mt-1" style={{ color: MUTE }}>{t("tx_review_note")}</div>
        </div>
      )}
      {receiptFile && !geminiApiKey && (
        <div className="mb-3 px-3 py-2 rounded border" style={{ borderColor: LINE }}>
          <div className="text-xs mb-2" style={{ color: MUTE }}>
            {t("tx_add_gemini_key_note")}
          </div>
          <input className={inputCls} style={inputStyle} value={geminiKeyInput} placeholder="AIza... (from Google AI Studio)"
            onChange={(e) => setGeminiKeyInput(e.target.value)} />
          <button type="button" onClick={() => geminiKeyInput.trim() && onSaveGeminiKey(geminiKeyInput.trim())}
            disabled={!geminiKeyInput.trim()} className="w-full mt-2 py-1.5 rounded text-xs font-medium disabled:opacity-40"
            style={{ background: TEAL, color: "#fff" }}>
            {t("tx_save_gemini_key")}
          </button>
        </div>
      )}

      <div className="flex gap-2 mb-3">
        <button onClick={() => setType("income")} className="flex-1 py-2 rounded text-sm font-medium border"
          style={{ background: form.type === "income" ? GREEN : "transparent", color: form.type === "income" ? "#fff" : INK, borderColor: form.type === "income" ? GREEN : LINE }}>
          {t("income")}
        </button>
        <button onClick={() => setType("expense")} className="flex-1 py-2 rounded text-sm font-medium border"
          style={{ background: form.type === "expense" ? RUST : "transparent", color: form.type === "expense" ? "#fff" : INK, borderColor: form.type === "expense" ? RUST : LINE }}>
          {t("cost")}
        </button>
      </div>
      <Field label={t("field_category")}>
        <select className={inputCls} style={inputStyle} value={form.category}
          onChange={(e) => setForm({ ...form, category: e.target.value })}>
          {categories.map((c) => (
            <option key={c.id} value={c.id}>{categoryLabelFor(c, apartments.find((a) => a.id === form.apartmentId))}</option>
          ))}
        </select>
        {activeCat && (activeCat.noteFi || activeCat.note) && (
          <div className="text-xs mt-1" style={{ color: MUTE }}>{lang === "fi" ? (activeCat.noteFi || activeCat.note) : activeCat.note}</div>
        )}
      </Field>
      <div className="grid grid-cols-2 gap-3">
        <Field label={t("field_date")}>
          <input type="date" className={inputCls} style={inputStyle} value={form.date}
            onChange={(e) => setForm({ ...form, date: e.target.value })} />
        </Field>
        <Field label={t("field_amount")}>
          <input type="number" step="0.01" className={inputCls} style={inputStyle} value={form.amount}
            placeholder="0.00" onChange={(e) => setForm({ ...form, amount: e.target.value })} />
        </Field>
      </div>
      <Field label={t("field_description")}>
        <input className={inputCls} style={inputStyle} value={form.description}
          placeholder="e.g. June rent, tenant Matti" onChange={(e) => setForm({ ...form, description: e.target.value })} />
      </Field>

      {initial && initial.recurringId && (
        <div className="text-xs mb-3 px-3 py-2 rounded" style={{ background: "#EEF2E9", color: "#4A5C3D" }}>
          {t("tx_recurring_edit_note")}
        </div>
      )}
      {!initial && (
        <>
          <label className="flex items-center gap-2 mb-3 text-sm" style={{ color: INK }}>
            <input type="checkbox" checked={repeatMonthly} onChange={(e) => setRepeatMonthly(e.target.checked)} />
            {t("tx_repeat_monthly")}
          </label>
          {repeatMonthly && (
            <Field label={t("tx_stop_after_month")}>
              <input type="month" className={inputCls} style={inputStyle} value={repeatEndMonth}
                onChange={(e) => setRepeatEndMonth(e.target.value)} />
            </Field>
          )}
        </>
      )}

      <button onClick={handleSave} disabled={!form.apartmentId || !(Number(form.amount) > 0) || saving}
        className="w-full mt-2 py-2.5 rounded text-sm font-medium disabled:opacity-40" style={{ background: TEAL, color: "#fff" }}>
        {saving ? t("tx_saving") : initial ? t("btn_save_changes") : t("modal_add_transaction")}
      </button>
    </Modal>
  );
}

/* ---------- Investment profitability analysis (kannattavuuslaskelma) ---------- */
function InvestmentAnalysisModal({ apartment, transactions, recurringTemplates, year, t, lang, onClose }) {
  const a = computeInvestmentAnalysis(apartment, transactions, recurringTemplates, year);
  const hasPriceInfo = a.debtFreePrice > 0;
  const hasPersonalLoan = Number(apartment.personalLoanAmount) > 0 && apartment.personalLoanStartDate && Number(apartment.personalLoanPayment) > 0;
  const debtService = hasPersonalLoan
    ? annualDebtService(
        { referenceDate: apartment.personalLoanStartDate, referenceBalance: apartment.personalLoanAmount, monthlyPayment: apartment.personalLoanPayment, annualRatePercent: apartment.personalLoanRate },
        year
      )
    : null;
  const operatingNet = a.r.incomeTotal - a.operatingCosts;
  const cashFlowAfterFinancing = debtService ? operatingNet - debtService.interest - debtService.principal : null;
  return (
    <Modal onClose={onClose} title={`${t("apt_analysis_title")}: ${apartment.name}`}>
      <div className="text-xs mb-4" style={{ color: MUTE }}>{t("apt_analysis_intro", { year })}</div>

      {!hasPriceInfo && (
        <div className="mb-4 px-3 py-2 rounded text-xs" style={{ background: "#FBEAE5", color: RUST }}>
          {t("apt_analysis_no_price")}
        </div>

      <div className="rounded border p-3 mb-3" style={{ borderColor: LINE }}>
        <div className="text-xs font-semibold uppercase tracking-wide mb-2" style={{ color: MUTE }}>{t("apt_analysis_yield_title")}</div>
        <RowLine label={t("apt_debt_free_price")} value={a.debtFreePrice} />
        <RowLine label={t("apt_analysis_rent_income")} value={a.r.incomeTotal} />
        <RowLine label={t("apt_analysis_operating_costs")} value={a.operatingCosts} negative />
        <div className="mt-2 pt-2 border-t flex items-center justify-between text-sm" style={{ borderColor: LINE }}>
          <span style={{ color: INK }}>{t("apt_gross_yield")}</span>
          <span className="font-mono font-semibold" style={{ color: INK }}>{a.grossYieldPercent != null ? a.grossYieldPercent.toFixed(2) + " %" : "-"}</span>
        </div>
        <div className="flex items-center justify-between text-sm">
          <span style={{ color: INK }}>{t("apt_net_yield")}</span>
          <span className="font-mono font-semibold" style={{ color: TEAL }}>{a.netYieldPercent != null ? a.netYieldPercent.toFixed(2) + " %" : "-"}</span>
        </div>
      </div>

      <div className="rounded border p-3 mb-3" style={{ borderColor: LINE }}>
        <div className="text-xs font-semibold uppercase tracking-wide mb-2" style={{ color: MUTE }}>{t("apt_analysis_cashflow_title")}</div>
        <RowLine label={t("apt_analysis_rent_income")} value={a.r.incomeTotal} />
        <RowLine label={t("apt_analysis_all_costs")} value={a.r.expenseTotal + a.r.interestTotal + a.r.capitalizedTotal} negative />
        <div className="mt-2 pt-2 border-t flex items-center justify-between text-sm" style={{ borderColor: LINE }}>
          <span style={{ color: INK }}>{t("apt_cash_flow")}</span>
          <span className="font-mono font-semibold" style={{ color: a.cashFlow >= 0 ? GREEN : RUST }}>{eur(a.cashFlow)}</span>
        </div>
        <div className="text-xs mt-1" style={{ color: MUTE }}>{t("apt_cash_flow_note")}</div>
      </div>

      {hasPersonalLoan ? (
        <div className="rounded border p-3 mb-3" style={{ borderColor: LINE }}>
          <div className="text-xs font-semibold uppercase tracking-wide mb-2" style={{ color: MUTE }}>{t("apt_analysis_financing_title")}</div>
          <RowLine label={t("apt_analysis_operating_net")} value={operatingNet} />
          <RowLine label={t("apt_analysis_interest_this_year")} value={debtService.interest} negative />
          <RowLine label={t("apt_analysis_principal_this_year")} value={debtService.principal} negative />
          <div className="mt-2 pt-2 border-t flex items-center justify-between text-sm" style={{ borderColor: LINE }}>
            <span style={{ color: INK }}>{t("apt_cash_flow_after_financing")}</span>

          </div>
          <div className="text-xs mt-1" style={{ color: MUTE }}>{t("apt_analysis_financing_note")}</div>
        </div>
      ) : (
        <div className="text-xs mb-3" style={{ color: MUTE }}>{t("apt_analysis_no_personal_loan")}</div>

/* ---------- Bulk import from Drive ---------- */
function BulkImportModal({ apartments, geminiApiKey, apiKey, onClose, onImport, t, lang }) {
  const [items, setItems] = useState([]);
  const [busy, setBusy] = useState(false);
  const [progress, setProgress] = useState("");

  const defaultApartmentId = apartments.length === 1 ? apartments[0].id : "";

  async function processFiles(files) {
    setBusy(true);
    const newItems = files.map((f) => ({
      key: f.id + "-" + uid(), fileId: f.id, fileName: f.name, mimeType: f.mimeType, url: f.url,
      status: "pending", include: true,
      form: { apartmentId: defaultApartmentId, type: "expense", category: "muu_kulu", date: new Date().toISOString().slice(0, 10), amount: "", description: f.name },
    }));
    setItems((prev) => [...prev, ...newItems]);
    for (let i = 0; i < newItems.length; i++) {
      const it = newItems[i];
      setProgress(`Reading ${i + 1} of ${newItems.length}: ${it.fileName}`);
      try {
        const buf = await driveReadFileBytes(it.fileId);
        const base64 = arrayBufferToBase64(buf);
        const extracted = await extractReceiptWithGemini(geminiApiKey, base64, it.mimeType || "application/pdf");
        const validCategories = extracted.type === "income" ? INCOME_CATEGORIES : EXPENSE_CATEGORIES;
        const category = validCategories.find((c) => c.id === extracted.category)
          ? extracted.category
          : (extracted.type === "income" ? "other_income" : "muu_kulu");
        setItems((prev) => prev.map((p) => p.key === it.key ? {
          ...p, status: "done",
          form: {
            ...p.form, type: extracted.type === "income" ? "income" : "expense", category,
            date: extracted.date || p.form.date, amount: extracted.amount != null ? String(extracted.amount) : "",
            description: extracted.description || p.fileName,
          },
        } : p));
      } catch (e) {
        setItems((prev) => prev.map((p) => (p.key === it.key ? { ...p, status: "error", error: e.message } : p)));
      }
    }
    setProgress("");
    setBusy(false);
  }

  function pickSingleFile() {
    window.gapi.load("picker", () => {
      const view = new google.picker.DocsView(google.picker.ViewId.DOCS)
        .setMimeTypes("image/png,image/jpeg,image/webp,image/heic,application/pdf");
      const picker = new google.picker.PickerBuilder()
        .addView(view).setOAuthToken(currentToken.access_token).setDeveloperKey(apiKey)
        .setCallback((data) => {
          if (data.action === google.picker.Action.PICKED) {
            const doc = data.docs[0];
            processFiles([{ id: doc.id, name: doc.name, mimeType: doc.mimeType, url: doc.url }]);
          }
        }).build();
      picker.setVisible(true);
    });
  }

  function pickFolderToScan() {
    window.gapi.load("picker", () => {
      const view = new google.picker.DocsView(google.picker.ViewId.FOLDERS).setSelectFolderEnabled(true).setIncludeFolders(true);
      const picker = new google.picker.PickerBuilder()
        .addView(view).setOAuthToken(currentToken.access_token).setDeveloperKey(apiKey)
        .setCallback(async (data) => {
          if (data.action === google.picker.Action.PICKED) {
            const doc = data.docs[0];
            setBusy(true);
            setProgress("Listing files in folder...");
            const files = await driveListFolderFiles(doc.id);
            setBusy(false);
            if (files.length === 0) { setProgress("No images or PDFs found directly in that folder."); return; }
            processFiles(files.map((f) => ({ id: f.id, name: f.name, mimeType: f.mimeType, url: f.webViewLink })));
          }
        }).build();
      picker.setVisible(true);
    });
  }

  function updateItem(key, patch) {
    setItems((prev) => prev.map((p) => (p.key === key ? { ...p, form: { ...p.form, ...patch } } : p)));
  }
  function toggleInclude(key) {
    setItems((prev) => prev.map((p) => (p.key === key ? { ...p, include: !p.include } : p)));
  }
  function removeItem(key) {
    setItems((prev) => prev.filter((p) => p.key !== key));
  }

  function doImport() {
    const ready = items.filter((it) => it.include && it.status === "done" && it.form.apartmentId && Number(it.form.amount) > 0);
    onImport(ready.map((it) => ({
      apartmentId: it.form.apartmentId, type: it.form.type, category: it.form.category,
      date: it.form.date, amount: Number(it.form.amount), description: it.form.description,
      attachmentFileId: it.fileId, attachmentName: it.fileName, attachmentUrl: it.url || "",
    })));
  }

  const readyCount = items.filter((it) => it.include && it.status === "done" && it.form.apartmentId && Number(it.form.amount) > 0).length;

  return (
    <Modal onClose={onClose} title={t("bulk_title")}>
      {!geminiApiKey && (
        <div className="text-xs mb-3 px-3 py-2 rounded" style={{ background: "#FBEAE5", color: RUST }}>
          {t("bulk_gemini_needed")}
        </div>
      )}
      <div className="flex gap-2 mb-3">
        <button onClick={pickSingleFile} disabled={!geminiApiKey || busy} type="button"
          className="flex-1 py-2 rounded text-sm font-medium border disabled:opacity-40" style={{ borderColor: LINE, color: INK }}>
          {t("bulk_pick_file")}
        </button>
        <button onClick={pickFolderToScan} disabled={!geminiApiKey || busy} type="button"
          className="flex-1 py-2 rounded text-sm font-medium border disabled:opacity-40" style={{ borderColor: LINE, color: INK }}>
          {t("bulk_pick_folder")}
        </button>
      </div>
      {progress && <div className="text-xs mb-3" style={{ color: MUTE }}>{progress}</div>}
      <div className="text-xs mb-3" style={{ color: MUTE }}>
        {t("bulk_scan_note")}
      </div>

      {items.length > 0 && (
        <div className="space-y-3 mb-3" style={{ maxHeight: 420, overflowY: "auto" }}>
          {items.map((it) => (
            <div key={it.key} className="rounded border p-2" style={{ borderColor: LINE }}>
              <div className="flex items-center justify-between mb-1 gap-2">
                <div className="text-xs font-medium truncate" style={{ color: INK }}>{it.fileName}</div>
                <div className="flex items-center gap-2 shrink-0">
                  {it.status === "pending" && <span className="text-xs" style={{ color: MUTE }}>{t("tx_reading_receipt")}</span>}
                  {it.status === "error" && <span className="text-xs" style={{ color: RUST }}>{lang === "fi" ? "Epäonnistui" : "Failed"}</span>}
                  <button onClick={() => removeItem(it.key)} type="button" className="text-xs" style={{ color: MUTE }}>{t("bulk_remove")}</button>
                </div>
              </div>
              {it.status === "error" && <div className="text-xs mb-1" style={{ color: RUST }}>{it.error}</div>}
              {it.status === "done" && (
                <>
                  <label className="flex items-center gap-1 text-xs mb-1" style={{ color: INK }}>
                    <input type="checkbox" checked={it.include} onChange={() => toggleInclude(it.key)} /> {t("bulk_include")}
                  </label>
                  <select className={inputCls} style={{ ...inputStyle, marginBottom: 4 }} value={it.form.apartmentId}
                    onChange={(e) => updateItem(it.key, { apartmentId: e.target.value })}>
                    <option value="">{t("bulk_choose_apartment")}</option>
                    {apartments.map((a) => <option key={a.id} value={a.id}>{a.name}</option>)}
                  </select>
                  <div className="grid grid-cols-2 gap-1 mb-1">
                    <select className={inputCls} style={inputStyle} value={it.form.type}

function TaxReportTab({ apartments, transactions, recurringTemplates, year, taxApartmentId, setTaxApartmentId, sheetUrl, filerName, t }) {
  const relevantApartments = taxApartmentId === "all" ? apartments : apartments.filter((a) => a.id === taxApartmentId);
  const [pdfBusy, setPdfBusy] = useState(false);
  const [pdfError, setPdfError] = useState("");

  function computeFor(apartmentId) {
    const apartment = apartments.find((a) => a.id === apartmentId);
    return computeApartmentYear(apartment, transactions, year);
  }

  function computeProjectedFor(apartmentId) {
    const apartment = apartments.find((a) => a.id === apartmentId);
    const projected = projectedTransactionsForYear(recurringTemplates || [], transactions, year);
    const merged = [...transactions, ...projected];
    return computeApartmentYear(apartment, merged, year);
  }

  async function downloadPdf() {
    setPdfBusy(true);
    setPdfError("");
    try {
      await generate7HSummaryPdf(relevantApartments, transactions, year, filerName);
    } catch (e) {
      setPdfError("Could not create the PDF: " + e.message);
    }
    setPdfBusy(false);
  }

  function downloadCsv() {
    const lines = [["Apartment", "Date", "Type", "Category", "Category (EN)", "Amount EUR", "Description"]];
    transactions
      .filter((tx) => new Date(tx.date).getFullYear() === year)
      .filter((tx) => taxApartmentId === "all" || tx.apartmentId === taxApartmentId)
      .forEach((tx) => {
        const a = apartments.find((a) => a.id === tx.apartmentId);
        lines.push([a?.name || "", tx.date, tx.type, catLabel(tx.category), catEn(tx.category), String(tx.amount).replace(".", ","), tx.description || ""]);
      });
    const csv = lines.map((row) => row.map((v) => `"${String(v).replace(/"/g, '""')}"`).join(";")).join("\n");
    const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
    const url = URL.createObjectURL(blob);
    const link = document.createElement("a");
    link.href = url; link.download = `vuokratulot_${year}.csv`; link.click();
    URL.revokeObjectURL(url);
  }

  if (apartments.length === 0) return <EmptyState title={t("overview_no_apartments_title")} body="Add an apartment and record transactions first." />;

  return (
    <Section eyebrow={String(year)} title={t("tax_title")} right={
      <div className="flex items-center gap-2 flex-wrap">
        <select value={taxApartmentId} onChange={(e) => setTaxApartmentId(e.target.value)} className="px-3 py-2 rounded border text-sm" style={{ borderColor: LINE, color: INK }}>
          <option value="all">{t("tax_all_separate")}</option>
          {apartments.map((a) => <option key={a.id} value={a.id}>{a.name}</option>)}
        </select>
        <button onClick={downloadCsv} className="px-3 py-2 rounded text-sm font-medium border" style={{ borderColor: LINE, color: INK }}>{t("tax_export_csv")}</button>
        <button onClick={downloadPdf} disabled={pdfBusy} className="px-3 py-2 rounded text-sm font-medium disabled:opacity-50" style={{ background: TEAL, color: "#fff" }}>
          {pdfBusy ? t("tax_building_pdf") : t("tax_download_pdf")}
        </button>
        <a href={VERO_7H_BLANK_URL} target="_blank" rel="noreferrer" className="px-3 py-2 rounded text-sm font-medium border" style={{ borderColor: LINE, color: INK }}>
          {t("tax_get_blank_form")}
        </a>
        {sheetUrl && <a href={sheetUrl} target="_blank" rel="noreferrer" className="px-3 py-2 rounded text-sm font-medium border" style={{ borderColor: LINE, color: INK }}>{t("tax_open_sheet")}</a>}
      </div>
    }>
      {pdfError && <div className="mb-3 px-3 py-2 rounded text-xs" style={{ background: "#FBEAE5", color: RUST }}>{pdfError}</div>}
      <div className="text-xs mb-5 px-3 py-2 rounded" style={{ background: "#EEF2E9", color: "#4A5C3D" }}>
        {t("tax_banner")}
      </div>
      <div className="space-y-6">
        {relevantApartments.map((a) => {
          const r = computeFor(a.id);
          const pr = computeProjectedFor(a.id);
          const share = (a.sharePercent ?? 100) / 100;
          return (
            <div key={a.id} className="rounded border overflow-hidden" style={{ borderColor: LINE, background: CARD }}>
              <div className="px-4 py-3 flex items-center justify-between" style={{ background: "#F1EFE6" }}>
                <div className="text-sm font-semibold" style={{ color: INK }}>{a.name}</div>
                <div className="text-xs" style={{ color: MUTE }}>{a.housingCompany}</div>
              </div>
              <div className="px-4 py-3">
                <div className="text-xs font-semibold uppercase tracking-wide mb-2" style={{ color: MUTE }}>{t("tax_income_header")}</div>
                {INCOME_CATEGORIES.map((c) => <RowLine key={c.id} label={`${c.fi} (${c.en})`} value={r.byCategory[c.id]} />)}
                <RowLine label={t("tax_total_income")} value={r.incomeTotal} bold />

                <div className="text-xs font-semibold uppercase tracking-wide mt-4 mb-2" style={{ color: MUTE }}>{t("tax_deductible_header")}</div>
                {r.deductibleCategories.map((c) => <RowLine key={c.id} label={categoryLabelFor(c, a)} value={r.byCategory[c.id]} negative />)}
                <RowLine label={t("tax_total_deductible")} value={r.expenseTotal} negative bold />

                <div className="mt-3 pt-3 border-t" style={{ borderColor: LINE }}>
                  <RowLine label={t("tax_net_result")} value={r.net} bold />
                  <RowLine label={`${t("tax_your_taxable_share")}, ${a.sharePercent ?? 100}%`} value={r.net * share} bold accent />
                </div>

                {r.capitalizedTotal !== 0 && (
                  <div className="mt-4 pt-3 border-t" style={{ borderColor: LINE }}>
                    <div className="text-xs font-semibold uppercase tracking-wide mb-2" style={{ color: MUTE }}>{t("tax_not_deductible")}</div>
                    {r.capitalizedCategories.map((c) => <RowLine key={c.id} label={categoryLabelFor(c, a)} value={r.byCategory[c.id]} negative />)}
                    <RowLine label={t("tax_total_added")} value={r.capitalizedTotal} negative bold />

                {r.interestTotal !== 0 && (

                    <div className="text-xs font-semibold uppercase tracking-wide mb-2" style={{ color: MUTE }}>{t("tax_interest_header")}</div>
                    {r.interestCategories.map((c) => <RowLine key={c.id} label={categoryLabelFor(c, a)} value={r.byCategory[c.id]} negative />)}
                    <RowLine label={t("tax_total_interest")} value={r.interestTotal} negative bold />
                    <RowLine label={`${t("tax_interest_share")}, ${a.sharePercent ?? 100}%`} value={r.interestTotal * share} negative />
                  </div>
                )}

                {(pr.incomeTotal !== r.incomeTotal || pr.expenseTotal !== r.expenseTotal) && (
                  <div className="mt-4 pt-3 border-t-2" style={{ borderColor: TEAL, background: "#EFF5F7" }}>
                    <div className="px-3 py-2">
                      <div className="text-xs font-semibold uppercase tracking-wide mb-2" style={{ color: TEAL }}>
                        {t("tax_projected_header")}
                      </div>
                      <RowLine label={t("tax_projected_income")} value={pr.incomeTotal} />
                      <RowLine label={t("tax_projected_deductible")} value={pr.expenseTotal} negative />
                      <RowLine label={t("tax_projected_net")} value={pr.net} bold />
                      <RowLine label={`${t("tax_projected_share")}, ${a.sharePercent ?? 100}%`} value={pr.net * share} bold accent />
                    </div>
                  </div>
                )}
              </div>
            </div>
          );
        })}
      </div>
    </Section>
  );
}
